<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>牌譜入力 – コミュニティ牌譜プロジェクト</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--sf:#fff;--sf2:#f1efe8;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;
  --b-bg:#e6f1fb;--b:#185fa5;--b-t:#0c447c;
  --a-bg:#faeeda;--a:#ba7517;--a-t:#633806;
  --g-bg:#eaf3de;--g:#3b6d11;
  --r-bg:#fcebeb;--r:#a32d2d;
  --tl-bg:#e1f5ee;--tl:#0f6e56;
  --gold:#c8920a;--gold-bg:#fdf3dc;
  --ra:8px;--ral:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--sf:#252523;--sf2:#2e2e2c;
  --bd:rgba(255,255,255,.1);--bd2:rgba(255,255,255,.2);
  --tx:#f0ede8;--tx2:#b4b2a9;--tx3:#888780;
  --b-bg:#0c3d6b;--b:#85b7eb;--b-t:#b5d4f4;
  --a-bg:#4a2800;--a:#ef9f27;--a-t:#fac775;
  --g-bg:#1e3d0a;--g:#97c459;
  --r-bg:#5a1414;--r:#f09595;
  --tl-bg:#053630;--tl:#5dcaa5;
  --gold:#e8b84b;--gold-bg:#2a2000;
}}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
.wrap{max-width:820px;margin:0 auto;padding:12px 12px 60px}

/* ── カード ── */
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--ral);padding:14px 16px;margin-bottom:10px}
.slabel{font-size:11px;color:var(--tx3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600}

/* ── ボタン ── */
button{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 14px;font-size:14px;color:var(--tx);cursor:pointer;transition:background .1s,transform .08s;-webkit-tap-highlight-color:transparent;font-family:inherit}
button:hover{background:var(--sf2)}button:active{transform:scale(.95)}
button:disabled{opacity:.4;cursor:default;transform:none}
button.pri{background:var(--b);border-color:var(--b);color:#e6f1fb}button.pri:hover{opacity:.88}
button.grn{background:var(--g);border-color:var(--g);color:#eaf3de}button.grn:hover{opacity:.88}
button.gold{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:600}
button.sml{font-size:12px;padding:4px 10px}
button.ghost{background:transparent;border-color:var(--bd);color:var(--tx3)}

/* ── フォーム ── */
input[type=text]{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 10px;font-size:14px;color:var(--tx);outline:none;width:100%;font-family:inherit}
input[type=text]:focus{box-shadow:0 0 0 2px var(--b)}
textarea{width:100%;background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 10px;font-size:13px;color:var(--tx);resize:none;font-family:inherit;outline:none}
textarea:focus{box-shadow:0 0 0 2px var(--b)}
select{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:7px 10px;font-size:14px;color:var(--tx);outline:none;width:100%;font-family:inherit;-webkit-appearance:none}

/* ── ナビ ── */
.top-nav{background:var(--sf);border-bottom:.5px solid var(--bd);position:sticky;top:0;z-index:100;padding:0 12px}
.top-nav-inner{max-width:820px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:48px}
.nav-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.nav-tabs{display:flex;gap:2px}
.nav-tab{font-size:12px;padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--tx3);cursor:pointer}
.nav-tab.on{background:var(--b-bg);color:var(--b-t);font-weight:600}

/* ── セクションナビ（サイドバー風） ── */
.sec-nav{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.sec-btn{font-size:12px;padding:5px 10px;border-radius:20px;border:.5px solid var(--bd2);background:var(--sf);color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap}
.sec-btn.on{background:var(--b);border-color:var(--b);color:#e6f1fb}
.sec-btn.done{border-color:var(--g);color:var(--g);background:var(--g-bg)}

/* ── 完成度バー ── */
.prog-wrap{height:6px;background:var(--bd);border-radius:3px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--b),var(--tl));border-radius:3px;transition:width .5s ease}

/* ── 牌キーボード ── */
.kbd-wrap{background:var(--sf2);border-radius:var(--ra);padding:10px}
.kbd-float{
  position:fixed;bottom:0;left:0;right:0;z-index:300;
  background:var(--sf);border-top:1px solid var(--bd2);
  padding:10px 12px 16px;
  box-shadow:0 -4px 20px rgba(0,0,0,.12);
  max-height:55vh;overflow-y:auto;
}
.kbd-toggle-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;padding:5px 12px;border-radius:20px;
  background:var(--sf2);border:.5px solid var(--bd2);
  color:var(--tx3);cursor:pointer;font-family:inherit;
  margin-top:6px;
}
.kbd-tabs{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.kbd-tab{font-size:12px;padding:4px 10px;border-radius:20px;border:.5px solid var(--bd2);background:var(--sf);color:var(--tx2);cursor:pointer}
.kbd-tab.on{background:var(--b);border-color:var(--b);color:#e6f1fb}
.kbd-row{display:flex;gap:3px;flex-wrap:wrap}
.tile-btn{font-size:22px;line-height:1;padding:4px 5px;min-width:38px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .08s,transform .08s}
.tile-btn:active{transform:scale(.88);background:var(--b-bg)}
.util-row{display:flex;gap:4px;margin-top:6px;padding-top:6px;border-top:.5px solid var(--bd)}
.util-btn{font-size:13px;padding:5px 12px;border-radius:6px;border:.5px solid var(--bd2);background:var(--sf);cursor:pointer}
.util-btn.del{color:var(--r)}

/* ── 手牌プレビュー ── */
.hand-prev{font-size:22px;min-height:28px;margin:6px 0;letter-spacing:1px;line-height:1.4;word-break:break-all;overflow-x:auto;white-space:nowrap;padding:4px 0}
.r5{position:relative;display:inline-block;line-height:1}
.r5::after{content:"";position:absolute;top:0;right:0;width:.35em;height:.35em;border-radius:50%;background:#e53935;box-shadow:0 0 2px #fff}

/* ── グリッド入力（ツモ/捨て） ── */
/* grid_test.html と同一構造 */
.grid-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
.grid-wrap{display:flex;flex-direction:column;gap:3px;}
.grid-row{display:flex;gap:3px;align-items:center;width:max-content;}
.grid-label{font-size:11px;color:var(--tx3);font-weight:600;width:32px;flex-shrink:0;text-align:right;padding-right:4px;}
.slot-as-input{
  width:36px;height:36px;
  flex-shrink:0;
  font-size:20px;text-align:center;font-family:inherit;
  border:.5px dashed var(--bd2);border-radius:5px;
  background:var(--sf);padding:0;cursor:pointer;
  -webkit-appearance:none;
  line-height:36px;
  box-sizing:border-box;
  outline:none;
  caret-color:transparent;
}
.slot-as-input:focus{border:2px solid var(--b);background:var(--b-bg);caret-color:var(--b);outline:none;}
.slot-as-input::placeholder{font-size:10px;color:var(--bd2);}
.slot-as-input.filled{border-style:solid;border-color:var(--bd);}
.slot-as-input.active{border:2px solid var(--b)!important;background:var(--b-bg)!important;caret-color:var(--b);}
.slot-as-input.disputed{border-color:#f39c12!important;background:rgba(243,156,18,.08)!important;}

/* リアルタイム捨て牌 */
.rt-panel{background:var(--sf2);border-radius:var(--ra);padding:10px 12px;margin-bottom:10px;border:.5px solid var(--bd)}
.rt-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:13px}
.rt-seat{font-size:10px;color:var(--tx3);width:28px;flex-shrink:0;font-weight:600}
.rt-tiles{letter-spacing:.5px;flex:1;overflow-x:auto;white-space:nowrap;min-height:20px}
.rt-empty{color:var(--bd2);font-size:10px}

/* ── 選手カード ── */
.player-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.player-card{border:.5px solid var(--bd);border-radius:var(--ra);padding:10px 12px;cursor:pointer;transition:all .15s;background:var(--sf)}
.player-card:hover{border-color:var(--b)}
.player-card.on{border-color:var(--b);background:var(--b-bg);border-width:1.5px}
.player-card .seat-lbl{font-size:10px;color:var(--tx3);margin-bottom:2px}
.player-card .p-name{font-size:15px;font-weight:500}
.player-card .p-badges{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.badge.pro{background:var(--a-bg);color:var(--a-t)}
.badge.player{background:var(--g-bg);color:var(--g)}

/* ── ランキング ── */
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--ra);border:.5px solid var(--bd);margin-bottom:6px;background:var(--sf)}
.rank-row.me{border-color:var(--b);background:var(--b-bg)}
.rank-num{width:28px;text-align:center;font-weight:700;font-size:16px;flex-shrink:0}
.rank-name{flex:1;font-size:14px}
.rank-pts{font-size:16px;font-weight:700;color:var(--gold)}

/* ── アカウント ── */
.pt-big{font-size:36px;font-weight:700;color:var(--gold);line-height:1}
.pt-bar-wrap{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin:6px 0}
.pt-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--a));border-radius:4px;transition:width 1s}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.shop-item{border:.5px solid var(--bd);border-radius:var(--ra);padding:10px 12px;display:flex;align-items:center;gap:10px;background:var(--sf)}
.shop-item-icon{font-size:26px}
.shop-item-name{font-size:13px;font-weight:500}
.shop-item-pts{font-size:12px;color:var(--gold);font-weight:700}
.pt-table{width:100%;border-collapse:collapse;font-size:13px}
.pt-table tr{border-bottom:.5px solid var(--bd)}
.pt-table td{padding:7px 6px}
.pt-table .td-pts{text-align:right;font-weight:700;white-space:nowrap}
.pt-table .hi{color:var(--gold)}
.pt-table .mid{color:var(--g)}

/* ── レポート ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body>*:not(#print-frame){display:none!important}
  #print-frame{display:block!important;position:static!important;inset:auto!important;width:100%!important;background:#fff!important;z-index:auto!important;padding:0!important;overflow:visible!important}
}

/* ── モーダル ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal-box{background:var(--sf);border-radius:var(--ral);padding:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx3);padding:0}

/* ── フローティング送信ボタン ── */
.fab-wrap{
  display:none; /* タブバーに統合するため非表示 */
}
.fab-submit{
  display:flex;align-items:center;gap:8px;
  padding:13px 20px;border-radius:28px;
  background:linear-gradient(135deg,var(--gold),var(--a));
  border:none;color:#fff;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,0,0,.25);
  transition:transform .12s,box-shadow .12s;
}
.fab-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3);}
.fab-submit:active{transform:scale(.95);}
.fab-report{
  padding:9px 16px;border-radius:20px;
  background:var(--sf);border:.5px solid var(--bd2);
  color:var(--tx2);font-size:13px;font-family:inherit;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
/* フローティングボタン分の余白 */
.wrap{padding-bottom:16px;}

.st.ok{display:block;background:var(--g-bg);color:var(--g)}
.st.warn{display:block;background:var(--a-bg);color:var(--a-t)}
</style>
</head>
<body>

<!-- ── リアルタイム小窓 ── -->
<div id="rt-window" style="
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;
  display:none;align-items:flex-start;justify-content:center;
  background:rgba(0,0,0,.45);padding-top:60px;
">
  <div style="width:min(480px,calc(100vw - 24px));max-height:calc(100vh - 80px);
    background:var(--sf);border-radius:var(--ral);
    box-shadow:0 8px 32px rgba(0,0,0,.25);
    display:flex;flex-direction:column;overflow:hidden">
    <!-- ヘッダー -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid var(--bd);flex-shrink:0">
      <div style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px">
        <span id="rt-badge" style="width:8px;height:8px;border-radius:50%;background:var(--g);display:inline-block;animation:rt-blink 2s ease-in-out infinite"></span>
        入力状況
      </div>
      <button onclick="document.getElementById('rt-window').style.display='none'" style="background:none;border:none;color:var(--tx3);cursor:pointer;font-size:20px;padding:0;line-height:1">✕</button>
    </div>
    <!-- タブ -->
    <div id="rt-tabs" style="display:flex;border-bottom:.5px solid var(--bd);flex-shrink:0;background:var(--sf2)"></div>
    <!-- コンテンツ -->
    <div id="rt-panel-inner" style="overflow-y:auto;padding:12px 14px;flex:1;font-size:0;min-height:200px">
      <div style="font-size:12px;color:var(--tx3);padding:8px 0">まだ入力はありません</div>
    </div>
  </div>
</div>
<style>
@keyframes rt-blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>

<!-- ── フローティング送信ボタン（常時表示） ── -->
<div class="fab-wrap" id="fab-wrap">
  <button class="fab-report" onclick="toggleRtWindow()" id="fab-rt" style="position:relative">
    👁 入力状況
    <span id="fab-rt-badge" style="display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--r);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center"></span>
  </button>
  <button class="fab-submit" onclick="submitAll()">🀄 送信する</button>
</div>
<script>
// FAB: 対局情報入力中は非表示
(function updateFab(){
  var fab=document.getElementById("fab-wrap");
  if(!fab)return;
  // stateはDOMより後に定義されるため、renderNavから呼ぶ
})();
</script>


<nav class="top-nav">
  <div class="top-nav-inner">
    <div class="nav-title">🀄 牌譜入力</div>
    <div class="nav-tabs">
      <button class="nav-tab on" onclick="setView('input')">入力</button>
      <button class="nav-tab" onclick="setView('ranking')">ランク</button>
      <button class="nav-tab" onclick="setView('account')">アカウント</button>
    </div>
  </div>
</nav>

<div class="wrap">
  <!-- CSVロード状態 -->
  <div id="master-status" class="st" style="display:none;margin-bottom:10px"></div>

  <!-- ════════════════════════════════════════ -->
  <!-- VIEW: 入力                              -->
  <!-- ════════════════════════════════════════ -->
  <div id="view-input">

    <!-- 完成度バー -->
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <!-- セクションナビ -->
    <div id="seat-indicator" style="display:none;padding:4px 14px 0;font-size:11px;color:var(--tx3)"></div>
    <div style="display:flex;align-items:center;gap:0">
      <div class="sec-nav" id="sec-nav" style="flex:1;overflow-x:auto"></div>
      <div id="top-action-btns" style="display:none;flex-shrink:0;padding:4px 8px;display:flex;gap:6px;align-items:center">
        <button onclick="toggleRtWindow()" style="padding:5px 10px;border-radius:14px;background:var(--sf);border:.5px solid var(--bd2);font-size:12px;font-family:inherit;cursor:pointer;color:var(--tx2);white-space:nowrap">👁 入力状況</button>
        <button onclick="submitAll()" style="padding:5px 12px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--a));border:none;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;white-space:nowrap">送信</button>
      </div>
    </div>

    <!-- セクションコンテンツ -->
    <div id="sec-content"></div>

  </div>

  <!-- ════════════════════════════════════════ -->
  <!-- VIEW: ランキング                        -->
  <!-- ════════════════════════════════════════ -->
  <div id="view-ranking" style="display:none">
    <h2 style="font-size:18px;font-weight:500;margin-bottom:4px">ランキング</h2>
    <p style="font-size:13px;color:var(--tx3);margin-bottom:14px">正確な入力で上位を目指そう。毎月上位者にプレゼントあり。</p>

    <div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:14px">
      <span style="font-size:28px">🎁</span>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:2px">今月の報酬</div>
        <div style="font-size:12px;color:var(--tx2)">🥇 1位: Amazonギフト券 ¥5,000　🥈 2位: ¥3,000　🥉 3位: ¥1,000</div>
      </div>
    </div>

    <div id="ranking-list"></div>
  </div>

  <!-- ════════════════════════════════════════ -->
  <!-- VIEW: アカウント                        -->
  <!-- ════════════════════════════════════════ -->
  <div id="view-account" style="display:none">
    <h2 style="font-size:18px;font-weight:500;margin-bottom:14px">マイページ</h2>

    <!-- ポイント表示 -->
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--gold-bg);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">🀄</div>
        <div>
          <div style="font-size:17px;font-weight:600" id="acct-name">あなた</div>
          <div style="font-size:12px;color:var(--tx3)" id="acct-handle">@user_1234　全体12位</div>
        </div>
      </div>
      <div style="background:var(--sf2);border-radius:var(--ra);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:11px;color:var(--tx3);margin-bottom:2px">保有ポイント</div>
          <div class="pt-big" id="k-pts-disp">1,240<span style="font-size:14px;margin-left:3px;color:var(--tx3)">pt</span></div>
        </div>
        <button class="gold sml" onclick="openShop()">🛒 使う</button>
      </div>
      <div style="font-size:11px;color:var(--tx3);display:flex;justify-content:space-between;margin-bottom:3px">
        <span>次の報酬まで</span><span>1,240 / 2,000 pt</span>
      </div>
      <div class="pt-bar-wrap"><div class="pt-bar" style="width:62%"></div></div>
    </div>

    <!-- 統計 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
      <div class="card" style="text-align:center;padding:10px">
        <div style="font-size:22px;font-weight:700">8<span style="font-size:12px">局</span></div>
        <div style="font-size:11px;color:var(--tx3)">入力対局数</div>
      </div>
      <div class="card" style="text-align:center;padding:10px">
        <div style="font-size:22px;font-weight:700">89.5<span style="font-size:12px">%</span></div>
        <div style="font-size:11px;color:var(--tx3)">正解率</div>
      </div>

// ── CSV パーサー（ダブルクォート対応）──
function parseCSV(text){
  var lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  var headers=lines[0].split(",").map(function(h){return h.trim();});
  return lines.slice(1).map(function(line){
    var cols=[]; var cur=""; var inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=c;
    }
    cols.push(cur.trim());
    var obj={};
    headers.forEach(function(h,i){obj[h]=cols[i]!==undefined?cols[i]:"";});
    return obj;
  });
}

// ── CSV → 内部データ構造に変換 ──

}
function applyTournamentsCSV(rows){
  TOURNAMENTS={};

    .forEach(function(r){
      if(!TOURNAMENTS[r.org_id])TOURNAMENTS[r.org_id]=[];
      TOURNAMENTS[r.org_id].push({id:r.id,label:r.label});
    });
}
function applyPlayersCSV(rows){

  rows.sort(function(a,b){return(+a.sort_order)-(+b.sort_order);})
    .forEach(function(r){
      if(!PLAYERS_MASTER[r.org_id])PLAYERS_MASTER[r.org_id]=[];
      PLAYERS_MASTER[r.org_id].push({
        id:r.id, name:r.name, ruby:r.ruby,
        isPro:r.is_pro==="1"||r.is_pro==="true",
      });
    });
}

// ── CSVファイル読み込み（fetch）──
function loadCSV(filename){
  var base=(function(){
    try{
      var sc=document.querySelector('script[src]');
      if(sc)return sc.src.replace(/[^/]*$/,"");
    }catch(e){}
    return"./";
  })();
  return fetch(base+filename)
    .then(function(r){
      if(!r.ok)throw new Error(filename+" not found ("+r.status+")");
      return r.text();
    });
}

function showLoadStatus(msg,isError){
  var el=document.getElementById("master-status");
  if(!el)return;
  el.textContent=msg;
  el.style.display=msg?"block":"none";
  el.className="st "+(isError?"warn":"ok");
}

function loadAllCSV(){
  showLoadStatus("マスタデータを読み込み中...",false);
  Promise.all([
    loadCSV("orgs.csv"),
    loadCSV("tournaments.csv"),
    loadCSV("players.csv"),
    loadCSV("points.csv"),
    loadCSV("scores.csv"),
    loadCSV("yaku.csv"),
  ]).then(function(texts){
    applyOrgsCSV(parseCSV(texts[0]));
    applyTournamentsCSV(parseCSV(texts[1]));
    applyPlayersCSV(parseCSV(texts[2]));
    applyPointsCSV(parseCSV(texts[3]));
    applyScoresCSV(parseCSV(texts[4]));
    applyYakuCSV(parseCSV(texts[5]));

    showLoadStatus("",false);

    console.warn("CSV fetch failed, using fallback:",err.message);
    loadFallback();
    MASTER_LOADED=true;
    showLoadStatus("⚠ CSVファイルが見つかりません。サンプルデータで起動しています。",true);
    initApp();
  });
}

// ═══════════════════════════════════════════════
// セクション
// ═══════════════════════════════════════════════
function sectionDone(key){
  if(key==="game")return state.gameFlow.matched;
  if(key==="player")return!!state.seat&&Object.values(state.seatMap||{}).some(Boolean);
  if(key==="haipai")return state.haipai.length>=13;
  if(key==="turns")return state.draws.some(Boolean)||state.discards.some(Boolean);
  if(key==="final")return state.finalHand.length>0;
  // wait は final に統合（final セクションで両方入力）
  if(key==="meld")return state.melds.length>0;
  if(key==="agari")return!!state.agari.type&&!!state.agari.score;
  return false;
}
function completion(){
  var done=SECTIONS.filter(function(s){return sectionDone(s.key);}).length;
  return Math.round(done/SECTIONS.length*100);
}
function renderNav(){
  var nav=document.getElementById("sec-nav");
  var matched=state.gameFlow.matched;
  // マッチング前: gameタブのみ表示
  // マッチング後: gameタブを非表示、他タブを表示
  var WJseats=["東家","南家","西家","北家"];
  var mySeatLabel=state.seat?WJseats[WE.indexOf(state.seat)]+"の情報を入力中":"プレイヤー";
  var visibleSections=SECTIONS.filter(function(s){
    if(!matched) return s.key==="game";
    return s.key!=="game";
  });
  nav.innerHTML=visibleSections.map(function(s){
    // seat未設定のとき haipai/turns/final/meld/agari はロック
    var locked=!state.seat && s.key!=="player";
    var cls="sec-btn"+(state.section===s.key?" on":sectionDone(s.key)?" done":locked?" locked":"");
    var label=s.key==="player"?("👤 "+mySeatLabel):(s.icon+" "+s.label);
    return'<button class="'+cls+'"'
      +(locked?' style="opacity:.35;pointer-events:none" title="プレイヤー設定後に入力できます"':'')
      +' onclick="setSection(\''+s.key+'\')">'+label+'</button>';
  }).join("");
  // マッチング後: 「← 対局情報に戻る」ボタン
  if(matched){
    nav.innerHTML+='<button class="sec-btn" onclick="backToGameInfo()" style="border-color:var(--tx3);color:var(--tx3)">← 対局情報</button>';
  }
  document.getElementById("prog-fill").style.width=completion()+"%";
  var fab=document.getElementById("fab-wrap");
  if(fab)fab.style.display="none";
  var topBtns=document.getElementById("top-action-btns");
  if(topBtns)topBtns.style.display=state.gameFlow.matched&&state.seat?"flex":"none";

  // 入力担当座席インジケーター
  var si=document.getElementById("seat-indicator");
  if(si){
    if(state.seat&&state.gameFlow.matched){
      var allP=Object.values(PLAYERS_MASTER).flat();
      var sm=state.seatMap||{};
      var WJseats=["東家","南家","西家","北家"];
      var mySeatIdx=WE.indexOf(state.seat);
      var mySeatLabel=WJseats[mySeatIdx]||"";
      var myPid=sm[state.seat];
      var myP=myPid?allP.find(function(x){return x.id===myPid;}):null;
      // 全4座席の簡易表示
      var allSeats=WE.map(function(w,wi){
        var pid=sm[w];
        var p=pid?allP.find(function(x){return x.id===pid;}):null;
        var isMe=w===state.seat;
        return'<span style="'+(isMe?'font-weight:700;color:var(--g);':'opacity:.6;')+'margin-right:10px">'
          +WJseats[wi]+': '+(p?p.name:"未設定")
          +(isMe?' ◀':'')
          +'</span>';
      }).join("");
      si.innerHTML=allSeats;
      si.style.display="block";
    } else {
      si.style.display="none";
    }
  }
}

// ═══════════════════════════════════════════════
// 牌キーボード
// ═══════════════════════════════════════════════
// ── テキスト→牌コード パーサー（元アプリ完全準拠）──
// 対応形式:
//   数牌: 123m 456p 789s  スペース不要
//   字牌: 1z〜7z  東南西北白発中  tsnbhfc  eswnhdc
//   赤5:  r5m r5p r5s  0m 0p 0s
//   略記: sss → 南南南  eee → 東東東
// parseTileText: 元アプリの parseTiles と同一方式
function parseTileText(s){
  if(!s)return[];
  s=s.replace(/[　,、，]+/g," ").replace(/\s+/g," ").trim();
  // スペースなし混在: 境界でトークン分割
  s=s.replace(/([eswhnfc])(?=[eswhnfcr0-9東南西北白発中])/gi,"$1 ")
     .replace(/([mps])(?=[0-9eswhnfcr東南西北白発中])/gi,"$1 ")
     .replace(/\s+/g," ").trim();
  var tokens=s.split(" ").filter(Boolean);
  var result=[];
  for(var j=0;j<tokens.length;j++){
    var tok=tokens[j];
    // 赤5
    if(/^r5[mps]$/i.test(tok)){result.push(tok.toLowerCase());continue;}
    // 字牌アルファベット単体
    if(/^[eswhnfc]$/i.test(tok)){
      var mapped=ALPHA_MAP[tok.toLowerCase()];
      if(mapped)result.push(mapped);
      continue;
    }
    // 字牌アルファベット複数
    if(/^[eswhnfc]{2,}$/i.test(tok)){
      for(var ci=0;ci<tok.length;ci++){
        var mapped=ALPHA_MAP[tok[ci].toLowerCase()];
        if(mapped)result.push(mapped);
      }
      continue;
    }
    // 日本語字牌単体
    var jiMap={"東":"1z","南":"2z","西":"3z","北":"4z","白":"5z","発":"6z","中":"7z"};
    if(jiMap[tok]){result.push(jiMap[tok]);continue;}
    // 日本語字牌複数
    var allJi=true;
    for(var ci=0;ci<tok.length;ci++){if(!jiMap[tok[ci]]){allJi=false;break;}}
    if(allJi&&tok.length>0){
      for(var ci=0;ci<tok.length;ci++)result.push(jiMap[tok[ci]]);
      continue;
    }
    // 数牌単体: 1m, 2p, 9s
    if(/^\d[mps]$/i.test(tok)){result.push(tok.toLowerCase());continue;}
    // 数牌複数: 123m, 456p
    var m=tok.match(/^(\d+)([mps])$/i);
    if(m){for(var di=0;di<m[1].length;di++)result.push(m[1][di]+m[2].toLowerCase());continue;}
    // 字牌数字: 1z-7z
    if(/^\d[z]$/i.test(tok)){result.push(tok.toLowerCase());continue;}
    var mz=tok.match(/^(\d+)[z]$/i);
    if(mz){for(var di=0;di<mz[1].length;di++){var n=parseInt(mz[1][di]);if(n>=1&&n<=7)result.push(n+"z");}continue;}
  }
  return result.filter(function(t){return TE[t]!==undefined;});
}

      +'<code style="background:var(--sf2);padding:1px 3px;border-radius:3px">f</code>=發 '

    textInputHtml='<div style="margin-bottom:8px">'
      +hint
      +'<div style="display:flex;gap:5px;align-items:center">'

      +'</div>'

  // 「牌ボタンで選ぶ」トグル

  // 牌ボタンパネル（フロート）
  var tilePanel="";
  if(isOpen){
    var tabs=KBD_TABS.map(function(t){
      return'<button class="kbd-tab'+(state.kbdTab===t.id?" on":"")
        +'" onclick="setKbdTab(\''+t.id+'\')">'+t.label+'</button>';
    }).join("");
    var cur=KBD_TABS.find(function(t){return t.id===state.kbdTab;});
    var tiles=cur.tiles.map(function(t){

// テキスト入力プレビュー
function kbdInpPreview(inputId, prevId){
  var inp=document.getElementById(inputId);
  var prv=document.getElementById(prevId);
  if(!inp||!prv)return;
  var tiles=parseTileText(inp.value);
  prv.innerHTML=tiles.length
    ? tiles.map(te).join("")+'<span style="font-size:11px;color:var(--tx3);margin-left:4px">'+tiles.length+'枚</span>'
    : "";
}

// テキスト入力確定
function kbdInpConfirm(fn, inputId){
  var inp=document.getElementById(inputId);
  if(!inp)return;
  var tiles=parseTileText(inp.value);
  if(!tiles.length)return;
  tiles.forEach(function(t){
    if(fn==="haipaiPick")          haipaiPick(t);
    else if(fn==="finalPick")      finalPick(t);
    else if(fn==="waitGridPick")   waitGridPick(t);
    else if(fn==="meldPickNakiTileDirect") meldPickNakiTileDirect(t);
    else if(fn==="meldPickDiscDirect")     meldPickDiscDirect(t);
    else if(fn==="meldPickRinshan")        meldPickRinshan(t);
    else if(fn==="meldPickKandora")        meldPickKandora(t);
    else if(fn==="gridTilePick")           gridTilePick(t);
  });
  inp.value="";
  var prv=document.getElementById(inputId.replace("kbd-inp-","kbd-prv-"));
  if(prv)prv.innerHTML="";
  renderNav();
  renderSection();
}


function applyKbdText(fn,inputId){kbdConfirm(fn,inputId);}

// テキスト入力確定（既存タイルを置き換え）
function applyTileText(fn){
  var inp=document.getElementById("tile-text-input");
  if(!inp)return;
  var tiles=parseTileText(inp.value);
  if(!tiles.length)return;
  // 呼び出し元の関数名でどのバッファか判定
  if(fn==="haipaiPick"){state.haipai=tiles.slice(0,13);}
  else if(fn==="finalPick"){state.finalHand=tiles.slice(0,14);}
  else if(fn==="waitPick"){state.waitTiles=tiles.filter(function(t,i,a){return a.indexOf(t)===i;});}
  else if(fn==="gridTilePick"){
    // ツモ・捨て牌: 全枚をドローバッファに流し込む
    tiles.forEach(function(t,i){if(i<18)state.draws[i]=t;});
  }
  renderNav();
  renderSection();
}

// ═══════════════════════════════════════════════
// グリッド（ツモ/捨て 18マス）
// ═══════════════════════════════════════════════
function renderGrid(){
  var MAX_BASIC=18;  // 基本表示数
  var MAX_EXT=21;    // 最大数（延長時）
  // activeSlot が18以上なら拡張表示
  if(!state.activeSlot){
    var found=false;
    for(var ri=0;ri<MAX_BASIC&&!found;ri++){
      for(var rt of ['draw','discard']){
        if(!(rt==='draw'?state.draws:state.discards)[ri]){
          state.activeSlot={grid:rt,idx:ri}; found=true; break;
        }
      }
    }
    if(!state.activeSlot) state.activeSlot={grid:'draw',idx:MAX_BASIC-1};
  }
  var g=state.activeSlot.grid, idx=state.activeSlot.idx;
  var maxShow=(idx>=MAX_BASIC)?MAX_EXT:MAX_BASIC;

  // ミニ行（入力済み牌を小さく表示）
  function miniRow(type,label){
    var tiles=type==='draw'?state.draws:state.discards;
    var cells=Array.from({length:maxShow},function(_,i){
      var t=tiles[i];
      var isCur=(g===type&&idx===i);
      var cell='<span id="mini-'+type+'-'+i+'" onclick="slotJump(\''+type+'\','+i+')"'
        +' style="display:inline-flex;align-items:center;justify-content:center;'
        +'width:22px;height:22px;border-radius:4px;border:.5px solid var(--bd);'
        +'background:'+(isCur?'var(--b)':t?'var(--sf)':'var(--sf2)')+';'
        +'color:'+(isCur?'#fff':'var(--tx)')+';font-size:'+(t?'14':'9')+'px;'
        +'cursor:pointer;flex-shrink:0;margin:1px;position:relative">'
        +(t?teHtml(t):(i+1))
        +(t?'<span onclick="slotClear(\''+type+'\','+i+',event)" '
          +'style="position:absolute;top:-4px;right:-4px;width:12px;height:12px;'
          +'border-radius:50%;background:var(--r);color:#fff;font-size:8px;'
          +'display:flex;align-items:center;justify-content:center;'
          +'line-height:1;z-index:2">✕</span>':"")
        +'</span>';
      return cell;
    }).join('');
    return'<div style="margin-bottom:4px">'
      +'<span style="font-size:10px;color:var(--tx3);margin-right:4px">'+label+'</span>'
      +'<div id="mini-wrap-'+type+'" style="display:flex;flex-wrap:wrap;gap:0">'+cells+'</div>'
      +'</div>';
  }

  // メイン入力（1牌・大きく）
  var tile=g==='draw'?state.draws[idx]:state.discards[idx];
  var iid='si-'+g+'-'+idx;
  var mainSlot='<div style="margin:10px 0 8px">'
    +'<div id="slot-turn-label" style="font-size:11px;color:var(--tx3);margin-bottom:6px;text-align:center">'
    +(g==='draw'?'ツモ':'捨て')+(idx+1)+'巡目'
    +(idx>=MAX_BASIC?'<span style="font-size:9px;color:var(--r);margin-left:4px">延長</span>':'')
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:center;gap:10px">'
    +'<div id="main-slot-wrap">'
    +'<input id="'+iid+'" type="text" inputmode="text"'
    +' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"'
    +' maxlength="3" placeholder=""'
    +' value=""'
    +' style="width:64px;height:64px;font-size:16px;font-family:monospace;text-align:center;'
    +'border:2px solid var(--b);border-radius:10px;background:var(--b-bg);'
    +'color:var(--tx);padding:0;-webkit-appearance:none;box-sizing:border-box;'
    +'outline:none;caret-color:var(--b);display:block;"'
    +' onfocus="slotFocused(\''+g+'\','+idx+')"'
    +' oninput="slotOnInput(this,\''+g+'\','+idx+')"'
    +' onkeydown="slotTextKeydown(event,this,\''+g+'\','+idx+')">'
    +'</div>'
    +'<div id="slot-tile-preview" style="font-size:52px;min-width:56px;text-align:left;line-height:1">'
    +(tile?teHtml(tile):'')
    +'</div>'
    +'</div>'
    +'<div style="font-size:11px;color:var(--tx3);margin-top:6px;text-align:center">'
    +'<code>3m</code> <code>s</code> <code>r5p</code>（スーツ文字で即確定）　Enter/→で次へ'
    +'</div>'
    +'</div>';

  // 前後ボタン
  var canPrev=!(g==='draw'&&idx===0);
  var navBtns='<div style="display:flex;justify-content:center;gap:12px;margin-bottom:8px">'
    +'<button id="nav-prev-btn" onclick="slotMovePrev(\''+g+'\','+idx+')" style="padding:6px 20px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);font-family:inherit;font-size:13px;cursor:pointer;'+(canPrev?'':'opacity:.3;pointer-events:none;')+'">← 前</button>'
    +'<button id="nav-next-btn" onclick="slotMoveNext(\''+g+'\','+idx+')" style="padding:6px 20px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);font-family:inherit;font-size:13px;cursor:pointer">次 →</button>'
    +'</div>';

  var dc=state.draws.filter(Boolean).length;
  var ec=state.discards.filter(Boolean).length;
  return'<div>'
    +miniRow('draw','ツモ')
    +miniRow('discard','捨て')
    +mainSlot
    +navBtns
    +'<div style="font-size:11px;color:var(--tx3);text-align:center">'
    +'ツモ:'+dc+'/'+maxShow+'　捨て:'+ec+'/'+maxShow
    +(hasDisputed()?'　<span style="color:#f39c12">⚠ 審議中</span>':"")
    +'</div>'
    +'<div id="grid-kbd-area">'+kbdHTML("gridTilePick","grid-kbd")+'</div>'
    +'</div>';
}


function slotJump(type,idx){
  slotSwitch(type,idx);
}

// スロット切り替え（renderSectionなし・iOSキーボード維持）
function slotSwitch(grid, idx){
  state.activeSlot={grid:grid, idx:idx};
  // ラベル更新
  var lbl=document.getElementById('slot-turn-label');
  if(lbl) lbl.innerHTML=(grid==='draw'?'ツモ':'捨て')+(idx+1)+'巡目'
    +(idx>=18?'<span style="font-size:9px;color:var(--r);margin-left:4px">延長</span>':'');
  // ナビボタン更新
  var navPrev=document.getElementById('nav-prev-btn');
  var navNext=document.getElementById('nav-next-btn');
  if(navPrev){
    navPrev.onclick=function(){slotMovePrev(grid,idx);};
    navPrev.style.opacity=(grid==='draw'&&idx===0)?'0.3':'1';
    navPrev.style.pointerEvents=(grid==='draw'&&idx===0)?'none':'auto';
  }
  if(navNext) navNext.onclick=function(){slotMoveNext(grid,idx);};
  // プレビュー更新
  var tile=grid==='draw'?state.draws[idx]:state.discards[idx];
  var prevArea=document.getElementById('slot-tile-preview');
  if(prevArea) prevArea.innerHTML=tile?teHtml(tile):'';
  // inputを取得（なければrenderSection fallback）
  var wrap=document.getElementById('main-slot-wrap');
  if(!wrap){
    renderSection();
    var el=document.getElementById('si-'+grid+'-'+idx);
    if(el){el.value='';el.focus();}
    return;
  }
  var ni=wrap.querySelector('input');
  if(!ni){
    renderSection();
    var el2=document.getElementById('si-'+grid+'-'+idx);
    if(el2){el2.value='';el2.focus();}
    return;
  }
  // ハンドラを一旦クリアしてからvalue変更（誤発火防止）
  ni.oninput=null; ni.onkeydown=null; ni.onfocus=null;
  ni.id='si-'+grid+'-'+idx;
  ni.value='';
  // ハンドラ再設定
  ni.onfocus  =function(){slotFocused(grid,idx);};
  ni.oninput  =function(){slotOnInput(ni,grid,idx);};
  ni.onkeydown=function(e){slotTextKeydown(e,ni,grid,idx);};
  // フォーカス
  ni.focus();
  // ミニ行更新
  slotUpdateMini();
}

function slotFocused(grid,idx){
  state.activeSlot={grid:grid,idx:idx};
}

function slotOnInput(input,type,idx){
  var v=input.value;
  if(!v)return;
  // プレビュー更新
  slotPreviewUpdate(input,v);
  var tiles=parseTileText(v);
  if(tiles.length!==1)return;
  var tile=tiles[0];
  if(v.trim().length>=tileInputLen(tile)){
    slotPreviewClear(input);
    slotConfirm(tile,type,idx);
  }
}

function slotConfirm(tile,type,idx){
  if(type==='draw') state.draws[idx]=tile;
  else              state.discards[idx]=tile;
  rtPush({type:type,idx:idx,tile:tile,seat:state.seat||'東家',ts:Date.now()});
  // 次スロットへ（slotSwitchが内部でfocusを行う）
  var ng=(type==='draw')?'discard':(idx+1<21?'draw':null);
  var ni=(type==='draw')?idx:idx+1;
  if(ng){slotSwitch(ng,ni);}
  else{slotUpdateMini();}
  renderNav();
}

function slotTextKeydown(e,input,type,idx){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    var v=input.value.trim();
    var tiles=v?parseTileText(v):[];
    if(tiles.length){
      slotConfirm(tiles[0],type,idx);
    } else {
      slotMoveNext(type,idx);
    }
  } else if(e.key==='Backspace'&&input.value===''){
    e.preventDefault();
    if(type==='draw'&&state.draws[idx]){state.draws[idx]=null;slotUpdateMini();}
    else if(type==='discard'&&state.discards[idx]){state.discards[idx]=null;slotUpdateMini();}
    else{slotMovePrev(type,idx);}
  } else if(e.key==='Escape'){
    input.blur();
  }
}

function slotMoveNext(type,idx){
  var ng=(type==='draw')?'discard':(idx+1<21?'draw':null);
  var ni=(type==='draw')?idx:idx+1;
  if(ng) slotSwitch(ng,ni);
}

function slotMovePrev(type,idx){
  var ng=(type==='discard')?'draw':(idx>0?'discard':null);
  var ni=(type==='discard')?idx:(idx-1);
  if(ng) slotSwitch(ng,ni);
}

function gridTilePick(t){
  if(!state.activeSlot)return;
  slotConfirm(t,state.activeSlot.grid,state.activeSlot.idx);
}

function slotClear(type,idx,e){
  if(e){e.stopPropagation();e.preventDefault();}
  if(type==='draw') state.draws[idx]=null;
  else state.discards[idx]=null;
  // キーボードを維持しながらミニ行だけ更新
  slotUpdateMini();
}
// ── 待ち牌グリッド（小ボックス方式）──
var waitActiveIdx=null; // アクティブなスロットindex

function renderWaitGrid(){
  // アクティブがなければ最初の空きへ
  if(waitActiveIdx===null){
    for(var i=0;i<8;i++){if(!state.waitTiles[i]){waitActiveIdx=i;break;}}
    if(waitActiveIdx===null)waitActiveIdx=7;
  }
  var idx=waitActiveIdx;
  var tile=state.waitTiles[idx]||null;
  var iid='wi-'+idx;

  // ミニ表示
  var miniCells=Array.from({length:8},function(_,i){
    var t=state.waitTiles[i]||null;
    var isCur=(idx===i);
    return'<span onclick="waitJump('+i+')"'
      +' style="display:inline-flex;align-items:center;justify-content:center;'
      +'width:22px;height:22px;border-radius:4px;border:.5px solid var(--bd);'
      +'background:'+(isCur?'var(--b)':t?'var(--sf)':'var(--sf2)')+';'
      +'color:'+(isCur?'#fff':'var(--tx)')+';font-size:'+(t?'14':'9')+'px;'
      +'cursor:pointer;margin:1px;position:relative">'
      +(t?teHtml(t):(i+1))
      +(t?'<span onclick="waitClear('+i+',event)" style="position:absolute;top:-4px;right:-4px;width:12px;height:12px;border-radius:50%;background:var(--r);color:#fff;font-size:8px;display:flex;align-items:center;justify-content:center;z-index:2">✕</span>':"")
      +'</span>';
  }).join('');

  // メインスロット
  var mainSlot='<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0">'
    +'<input id="'+iid+'" type="text" inputmode="text"'
    +' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"'
    +' maxlength="3" placeholder="待ち"'
    +' value=""'
    +' style="width:56px;height:56px;font-size:14px;font-family:monospace;text-align:center;'
    +'border:2px solid var(--b);border-radius:10px;background:var(--b-bg);'
    +'color:var(--tx);padding:0;-webkit-appearance:none;box-sizing:border-box;outline:none;caret-color:var(--b)"'
    +' onfocus="waitFocused('+idx+')"'
    +' oninput="waitOnInput(this,'+idx+')"'
    +' onkeydown="waitKeydown(event,this,'+idx+')">'
    +'<div id="wait-tile-preview" style="font-size:42px;min-width:44px;line-height:1">'
    +(tile?teHtml(tile):'')
    +'</div>'
    +'</div>';

  var navBtns='<div style="display:flex;justify-content:center;gap:8px;margin-bottom:6px">'
    +'<button onclick="waitMovePrev('+idx+')" style="padding:4px 14px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);font-family:inherit;font-size:12px;cursor:pointer;'+(idx===0?'opacity:.3;pointer-events:none;':'')+'">← 前</button>'
    +'<button onclick="waitMoveNext('+idx+')" style="padding:4px 14px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);font-family:inherit;font-size:12px;cursor:pointer">次 →</button>'
    +'</div>';

  var floatKbd=kbdHTML("waitGridPick","grid-kbd");
  return'<div>'
    +'<div style="margin-bottom:4px;display:flex;flex-wrap:wrap;gap:0">'+miniCells+'</div>'
    +mainSlot
    +navBtns
    +floatKbd
    +'</div>';
}

function waitJump(i){
  waitActiveIdx=i;
  renderSection();
  setTimeout(function(){
    var el=document.getElementById('wi-'+i);
    if(el){el.value='';el.focus();}
  },30);
}
function waitClear(i,e){
  e.stopPropagation();
  state.waitTiles[i]=null;
  waitActiveIdx=i;
  renderSection();
}
function waitMoveNext(idx){
  if(idx+1<8){waitActiveIdx=idx+1;renderSection();
    setTimeout(function(){var el=document.getElementById('wi-'+(idx+1));if(el){el.value='';el.focus();}},30);}
}
function waitMovePrev(idx){
  if(idx>0){waitActiveIdx=idx-1;renderSection();
    setTimeout(function(){var el=document.getElementById('wi-'+(idx-1));if(el){el.value='';el.focus();}},30);}
}


function waitFocused(i){
  waitActiveIdx=i;
}

function waitSlotClick(i){
  if(waitActiveIdx===i){waitActiveIdx=null;renderSection();return;}
  waitActiveIdx=i;
  renderSection();
  var el=document.getElementById("wi-"+i);
  if(el){el.value="";el.focus();}
}

function waitRemove(i,e){
  if(e)e.stopPropagation();
  state.waitTiles.splice(i,1);
  waitActiveIdx=null;
  renderSection();
}

function waitGridPick(t){
  if(waitActiveIdx===null){waitActiveIdx=0;}
  waitConfirm(t,waitActiveIdx);
}

function waitOnInput(input,i){
  var v=input.value;
  if(!v)return;
  // プレビュー
  var tiles=parseTileText(v);
  var prevArea=document.getElementById('wait-tile-preview');
  if(prevArea){prevArea.innerHTML=tiles.length?teHtml(tiles[0]):'';}
  if(tiles.length!==1)return;
  if(v.trim().length>=tileInputLen(tiles[0])){
    if(prevArea)prevArea.innerHTML='';
    waitConfirm(tiles[0],i);
  }
}

function waitConfirm(tile,i){
  state.waitTiles[i]=tile;
  renderNav();
  var next=null;
  for(var j=i+1;j<8;j++){if(!state.waitTiles[j]){next=j;break;}}
  waitActiveIdx=(next!==null)?next:i;
  renderSection();
  setTimeout(function(){
    var el=document.getElementById('wi-'+waitActiveIdx);
    if(el){el.value='';el.focus();}
  },30);
}

function waitKeydown(e,input,i){
  if(e.key==="Enter"){
    e.preventDefault();
    var tiles=parseTileText(input.value);
    if(tiles.length){waitConfirm(tiles[0],i);}
    else{waitMoveNext(i);}
  } else if(e.key==="Backspace"&&input.value===""){
    e.preventDefault();
    if(state.waitTiles[i]){state.waitTiles[i]=null;renderSection();}
    else{waitMovePrev(i);}
  } else if(e.key==="Escape"){
    waitActiveIdx=null;renderSection();
  }
}

function kbdDelete(){
  if(state.section==="haipai"){state.haipai.pop();}
  else if(state.section==="final"){state.finalHand.pop();}
  renderSection();
}
function kbdClear(){
  if(state.section==="haipai"){state.haipai=[];}
  else if(state.section==="final"){state.finalHand=[];}
  renderSection();
}
function haipaiPick(t){
  if(state.haipai.length<13){state.haipai.push(t);renderSection();}
}
function finalPick(t){
  if(state.finalHand.length<14){state.finalHand.push(t);renderSection();}
}
function waitPick(t){
  if(!state.waitTiles.includes(t)){state.waitTiles.push(t);renderSection();}
}

// セクションレンダリング
// ═══════════════════════════════════════════════

        +(p.isPro?'<span style="font-size:10px;background:rgba(255,255,255,.2);padding:1px 5px;border-radius:3px">PRO</span>':'')+p.name
        +(isSel?'<span style="font-size:11px;margin-left:2px">✓</span>':"")
        +'</div>';
    }).join("");

    // 全員割り当て済みの場合のメッセージ
    if(!playerList) playerList='<span style="font-size:12px;color:var(--tx3)">全員配置済み</span>';

    // 座席ボックス
    var seatBoxes=WE.map(function(w,wi){
      var seat=WJseats[wi];
      var assignedId=sm[w];
      var assignedP=assignedId?allP.find(function(p){return p.id===assignedId;}):null;
      var isMe=(state.seat===w);
      var rowBd=isMe?"var(--g)":selPid?"var(--b)":"var(--bd)";
      var rowBg=isMe?"var(--g-bg)":"var(--sf)";

      var content="";
      if(assignedP){
        // 割り当て済み: 名前 + 解除ボタン + 「〇家の情報を入力」ボタン
        var meBg=isMe?"var(--g)":"var(--sf2)";
        var meBd=isMe?"1px solid var(--g)":".5px solid var(--bd2)";
        var meCol=isMe?"var(--g-bg)":"var(--tx3)";
        content='<div style="display:flex;align-items:center;gap:8px;flex:1">'
          +'<span style="font-size:14px;font-weight:500">'+assignedP.name+'</span>'
          +'<button onclick="event.stopPropagation();gfAssignSeat(\''+w+'\',null)" '
            +'style="font-size:11px;padding:2px 8px;border-radius:4px;'
            +'background:none;border:.5px solid var(--bd2);cursor:pointer;color:var(--tx3)">← 外す</button>'
          +'</div>'
          +'<button onclick="gfSetMyseat(\''+w+'\')" '
            +'style="font-size:11px;padding:3px 8px;border-radius:6px;font-family:inherit;cursor:pointer;'
            +'background:'+meBg+';border:'+meBd+';color:'+meCol+'">'
            +seat+'の情報を入力</button>';
      } else if(selPid){
        var selP=allP.find(function(x){return x.id===selPid;});
        content='<button data-seatw="'+w+'" onclick="gfDropToSeat(this.dataset.seatw)" '
          +'style="font-size:12px;padding:4px 12px;border-radius:6px;font-family:inherit;cursor:pointer;'
          +'background:var(--b);border:none;color:#e6f1fb;font-weight:600">'
          +(selP?selP.name:"選手")+'をここに配置</button>';
      } else {
        content='<span style="font-size:12px;color:var(--tx3)">↑ 選手を選んでタップ</span>';
      }

      return'<div style="border:.5px solid '+rowBd+';border-radius:var(--ra);'
        +'background:'+rowBg+';padding:10px 12px;margin-bottom:6px;'
        +'min-height:52px;transition:all .15s">'
        +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
        +'<div style="font-size:13px;font-weight:600;color:var(--tx2);min-width:32px">'+seat+'</div>'
        +content
        +'</div>'
        +'</div>';
    }).join("");

    var myChosen=!!state.seat;
    var mySeatLabel2=myChosen?WJseats[WE.indexOf(state.seat)]:"";

    h='<div class="card">'
      +'<div class="slabel">👤 座席割り当て</div>'
      +(selPid
        ?'<div style="background:var(--b-bg);border:.5px solid var(--b);border-radius:var(--ra);padding:8px 12px;margin-bottom:10px;font-size:13px;color:var(--b)">'
          +'✓ '+(allP.find(function(x){return x.id===selPid;})||{name:"?"}).name+'を選択中 — 座席をタップして配置'
          +'<button onclick="state.playerDragSel=null;renderSection()" '
            +'style="margin-left:8px;font-size:11px;padding:2px 8px;border-radius:4px;background:none;border:.5px solid var(--b);color:var(--b);cursor:pointer">キャンセル</button>'
          +'</div>'
        :'<p style="font-size:12px;color:var(--tx3);margin-bottom:10px">①選手名をタップして選択 → ②座席をタップして配置<br>「外す」で再配置、別の座席への移動も可能</p>')
      +'<div style="display:flex;flex-wrap:wrap;gap:0;margin-bottom:12px;padding:10px;background:var(--sf2);border-radius:var(--ra)">'
      +'<div style="font-size:11px;color:var(--tx3);width:100%;margin-bottom:6px">未配置の選手</div>'
      +playerList
      +'</div>'
      +seatBoxes
      +(myChosen
        ?'<div style="background:var(--g-bg);border:.5px solid var(--g);border-radius:var(--ra);'
          +'padding:8px 12px;font-size:13px;color:var(--g);font-weight:600;margin-top:8px">'
          +'✓ '+mySeatLabel2+'の情報を入力します</div>'
          +'<button onclick="setSection(\'haipai\')"'
          +' style="width:100%;margin-top:10px;padding:12px;border-radius:var(--ra);'
          +'background:var(--b);border:none;color:#e6f1fb;font-size:15px;'
          +'font-weight:600;font-family:inherit;cursor:pointer">'

      +'<div class="slabel">🃏 配牌 <span style="color:var(--tx3);font-weight:400">(13枚)</span></div>'

  else if(s==="turns"){
    h='<div class="card">'
      +'<div class="slabel">♻️ ツモ牌・捨て牌</div>'

      +'<div class="slabel">🖐 最終手牌</div>'
      +'<div class="hand-prev">'+handPreview(state.finalHand)+'</div>'
      +kbdHTML("finalPick","",true)
      +'</div>'
      +'<div class="card" style="margin-top:8px">'
      +'<div class="slabel">⏳ 待ち牌 <span style="color:var(--tx3);font-weight:400">(複数可)</span></div>'

      +renderWaitGrid()

  else if(s==="meld"){

    var seats=["東家","南家","西家","北家"];

        +'color:'+(on?'#e6f1fb':'var(--tx)')+'">'+seat+'</button>';
    }).join('');
    var howBtn=["ツモ","ロン","流局"].map(function(t){
      var on=ag.type===t;
      return'<button onclick="state.agari.type=\''+t+'\';renderNav();renderSection()"'
        +' style="flex:1;padding:10px;border-radius:var(--ra);font-size:14px;font-family:inherit;cursor:pointer;'

      +'</div>'

      if(ag.score)parts.push(ag.score+"点");
      summary='<div style="background:var(--g-bg);border:.5px solid var(--g);border-radius:var(--ra);'

      +'<div style="display:flex;gap:6px">'+howBtn+'</div>'
      +fromSection

      +'</div>';

  el.innerHTML=h;
}

// ═══════════════════════════════════════════════
// 送信
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
// 対局情報フロー（4ステップ）
// ═══════════════════════════════════════════════
function renderGameFlow(){
  var gf=state.gameFlow;
  var step=gf.step;

  // ── ステップインジケーター ──
  var stepLabels=["対局日","団体","大会","選手","確認"];
  var dots=stepLabels.map(function(l,i){
    var done=i<step||(i===step&&step===4);
    var active=i===step&&step<4;
    var dot=done
      ?`<div style="width:22px;height:22px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700">✓</div>`
      :active
      ?`<div style="width:22px;height:22px;border-radius:50%;background:var(--b);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700">${i+1}</div>`
      :`<div style="width:22px;height:22px;border-radius:50%;background:var(--bd2);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--tx3)">${i+1}</div>`;
    return`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      ${dot}
      <div style="font-size:9px;color:${active?"var(--b)":done?"var(--g)":"var(--tx3)"};white-space:nowrap;font-weight:${active?"700":"400"}">${l}</div>
    </div>`;
  }).join(`<div style="flex:1;height:1px;background:var(--bd);margin-bottom:14px;align-self:center;margin-top:-14px"></div>`);

  var indicator=`<div style="display:flex;align-items:flex-start;margin-bottom:18px">${dots}</div>`;

  // ── 戻るボタン ──
  var backBtn=step>0&&step<4
    ?`<button class="ghost sml" style="margin-bottom:12px" onclick="gfBack()">← 戻る</button><br>`
    :"";

  var body="";

  // ── STEP 0: 対局日 ──
  if(step===0){
    var today=new Date().toISOString().slice(0,10);
    body=`<div>
      <div class="slabel">対局日を選択</div>
      <input type="date" id="gf-date" value="${gf.date||today}"
        style="background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:10px 12px;font-size:16px;color:var(--tx);width:100%;outline:none;font-family:inherit;margin-bottom:14px"
        oninput="state.gameFlow.date=this.value">
      <button class="pri" style="width:100%;padding:11px" onclick="gfNext()">次へ：団体を選ぶ →</button>
    </div>`;
    // 今日の日付をデフォルト
    if(!gf.date) state.gameFlow.date=today;
  }

  // ── STEP 1: 団体選択 ──
  else if(step===1){
    var orgBtns=ORGS.map(function(o){
      var on=gf.org===o.id;
      return`<button onclick="gfSelectOrg('${o.id}')"
        style="padding:14px 10px;border-radius:var(--ra);font-size:15px;font-family:inherit;
          background:${on?"var(--b)":"var(--sf)"};
          border:${on?"1.5px solid var(--b)":".5px solid var(--bd2)"};
          color:${on?"#e6f1fb":"var(--tx)"};
          cursor:pointer;transition:all .15s;font-weight:${on?"700":"400"}">
        ${o.label}
      </button>`;
    }).join("");
    body=`<div>
      <div class="slabel">団体を選択</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">${orgBtns}</div>
      ${gf.org?`<button class="pri" style="width:100%;padding:11px" onclick="gfNext()">次へ：大会を選ぶ →</button>`:""}
    </div>`;
  }

  // ── STEP 2: 大会選択 ──
  else if(step===2){
    var org=ORGS.find(function(o){return o.id===gf.org;});
    var tours=TOURNAMENTS[gf.org]||[];
    var tourBtns=tours.map(function(t){
      var on=gf.tournament===t.id;
      return`<button onclick="gfSelectTournament('${t.id}')"
        style="padding:12px 14px;border-radius:var(--ra);font-size:14px;font-family:inherit;text-align:left;
          background:${on?"var(--b-bg)":"var(--sf)"};
          border:${on?"1.5px solid var(--b)":".5px solid var(--bd2)"};
          color:${on?"var(--b-t)":"var(--tx)"};
          cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px">
        <span style="font-size:18px">${on?"✅":"⬜"}</span>
        <span style="font-weight:${on?"700":"400"}">${t.label}</span>
      </button>`;
    }).join("");
    body=`<div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:8px">団体：<strong style="color:var(--tx)">${org?org.label:""}</strong></div>
      <div class="slabel">大会を選択</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px">${tourBtns}</div>
      ${gf.tournament?`<button class="pri" style="width:100%;padding:11px" onclick="gfNext()">次へ：選手を選ぶ →</button>`:""}
    </div>`;
  }

  // ── STEP 3: 選手選択 ──
  else if(step===3){
    var org3=ORGS.find(function(o){return o.id===gf.org;});
    var tour3=(TOURNAMENTS[gf.org]||[]).find(function(t){return t.id===gf.tournament;});
    // 表示する団体タブ
    var orgTab=gf.playerOrgTab||gf.org;
    var orgTabBtns=ORGS.filter(function(o){return(PLAYERS_MASTER[o.id]||[]).length>0;}).map(function(o){
      var on=orgTab===o.id;
      return`<button class="kbd-tab${on?" on":""}" onclick="gfSetPlayerTab('${o.id}')">${o.label}</button>`;
    }).join("");

    var playersInTab=PLAYERS_MASTER[orgTab]||[];
    var playerBtns=playersInTab.map(function(p){
      var on=gf.players.includes(p.id);
      return`<button onclick="gfTogglePlayer('${p.id}')"
        style="padding:10px 12px;border-radius:var(--ra);font-family:inherit;text-align:left;
          background:${on?"var(--b-bg)":"var(--sf)"};
          border:${on?"1.5px solid var(--b)":".5px solid var(--bd2)"};
          color:${on?"var(--b-t)":"var(--tx)"};
          cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px">
        <span style="font-size:18px;flex-shrink:0">${on?"✅":"⬜"}</span>
        <div>
          <div style="font-size:14px;font-weight:${on?"700":"400"}">${p.name}</div>
          <div style="font-size:10px;color:var(--tx3)">${p.ruby}${p.isPro?" · PRO":""}</div>
        </div>
      </button>`;
    }).join("");

    // 選択済み選手チップ
    var selectedChips=gf.players.length
      ?gf.players.map(function(id){
          var p=Object.values(PLAYERS_MASTER).flat().find(function(x){return x.id===id;});
          return p?`<span style="font-size:12px;padding:3px 10px;border-radius:20px;background:var(--b);color:#e6f1fb;display:inline-flex;align-items:center;gap:5px">
            ${p.name}
            <span style="cursor:pointer;opacity:.7" onclick="gfTogglePlayer('${p.id}')">✕</span>
          </span>`:""}).join("")
      :`<span style="font-size:12px;color:var(--tx3)">まだ選択されていません（最大4名）</span>`;

    body=`<div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:6px">
        ${org3?org3.label:""} / ${tour3?tour3.label:""}
      </div>
      <div class="slabel">出場選手を選択 <span style="font-weight:400;color:var(--tx3)">(最大4名)</span></div>

      <!-- 選択済みチップ -->
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:28px">${selectedChips}</div>

      <!-- 団体タブ -->
      <div class="kbd-tabs" style="margin-bottom:8px">${orgTabBtns}</div>

      <!-- 選手リスト -->
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">${playerBtns}</div>

      ${gf.players.length>=2
        ?`<button class="pri" style="width:100%;padding:11px" onclick="gfNext()">次へ：確認 →</button>`
        :`<div style="font-size:12px;color:var(--tx3);text-align:center;padding:6px">2名以上選択してください</div>`}
    </div>`;
  }

  // ── STEP 4: 確認・マッチング ──
  else if(step===4){
    var org4=ORGS.find(function(o){return o.id===gf.org;});
    var tour4=(TOURNAMENTS[gf.org]||[]).find(function(t){return t.id===gf.tournament;});
    var selPlayers=gf.players.map(function(id){
      return Object.values(PLAYERS_MASTER).flat().find(function(x){return x.id===id;});
    }).filter(Boolean);

    var matchKey=makeMatchKey(gf.date,gf.org,gf.tournament,gf.players);
    var alreadyMatched=gf.matched&&gf.matchKey===matchKey;

    body=`<div>
      <div class="slabel">入力内容を確認</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        <div style="background:var(--sf2);border-radius:var(--ra);padding:10px 14px">
          <div style="font-size:10px;color:var(--tx3);margin-bottom:2px">対局日</div>
          <div style="font-size:15px;font-weight:600">${gf.date}</div>
        </div>
        <div style="background:var(--sf2);border-radius:var(--ra);padding:10px 14px">
          <div style="font-size:10px;color:var(--tx3);margin-bottom:2px">団体 / 大会</div>
          <div style="font-size:15px;font-weight:600">${org4?org4.label:""} / ${tour4?tour4.label:""}</div>
        </div>
        <div style="background:var(--sf2);border-radius:var(--ra);padding:10px 14px">
          <div style="font-size:10px;color:var(--tx3);margin-bottom:3px">出場選手（${selPlayers.length}名）</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px">
            ${selPlayers.map(function(p){
              return`<span style="font-size:13px;padding:3px 10px;border-radius:20px;background:var(--b-bg);color:var(--b-t)">${p.name}</span>`;
            }).join("")}
          </div>
        </div>
      </div>

      ${alreadyMatched
        ?`<div style="background:var(--g-bg);border:.5px solid var(--g);border-radius:var(--ra);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">✅</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--g)">マッチング成功！</div>
              <div style="font-size:12px;color:var(--g)">この対局の牌譜ファイルへの入力が可能になりました。</div>
            </div>
          </div>
          <button class="pri" style="width:100%;padding:11px;font-size:15px" onclick="gfStartInput()">🀄 牌譜入力を開始する</button>`
        :`<div style="background:var(--b-bg);border:.5px solid var(--b);border-radius:var(--ra);padding:12px 14px;margin-bottom:12px;font-size:12px;color:var(--b-t)">
            ⚡ 同じ日付・団体・大会・選手を入力した他のユーザーとマッチングします。<br>
            一致した場合、同じ牌譜ファイルへの入力が可能になります。
          </div>
          <button class="gold" style="width:100%;padding:12px;font-size:15px;border-radius:var(--ra);border:none;cursor:pointer;font-family:inherit;font-weight:700" onclick="gfDoMatch()">🔍 マッチングを開始する</button>`
      }
      <button class="ghost" style="width:100%;padding:8px;margin-top:8px" onclick="gfBack()">← 修正する</button>
    </div>`;
  }

  return`<div class="card">
    <div class="slabel">🀄 対局情報</div>
    ${indicator}${backBtn}${body}
  </div>`;
}

// ── ゲームフロー操作 ──
function gfNext(){
  var gf=state.gameFlow;
  if(gf.step===0&&!gf.date)return;
  if(gf.step===1&&!gf.org)return;
  if(gf.step===2&&!gf.tournament)return;
  if(gf.step===3&&gf.players.length<2)return;
  state.gameFlow.step++;
  renderSection();
}
function gfBack(){
  if(state.gameFlow.step>0){state.gameFlow.step--;renderSection();}
}
function gfSelectOrg(id){
  state.gameFlow.org=id;
  state.gameFlow.tournament=null;
  state.gameFlow.players=[];
  state.gameFlow.playerOrgTab=id;
  renderSection();
}
function gfSelectTournament(id){
  state.gameFlow.tournament=id;
  renderSection();
}
function gfSetPlayerTab(orgId){
  state.gameFlow.playerOrgTab=orgId;
  renderSection();
}
function gfTogglePlayer(id){
  var arr=state.gameFlow.players;
  var idx=arr.indexOf(id);
  if(idx>=0){
    state.gameFlow.players=arr.filter(function(x){return x!==id;});
  } else {
    if(arr.length>=4){
      alert("選手は最大4名まで選択できます");return;
    }
    state.gameFlow.players=[...arr,id];
  }
  renderSection();
}
function gfDoMatch(){
  var gf=state.gameFlow;
  var key=makeMatchKey(gf.date,gf.org,gf.tournament,gf.players);
  // デモ：常にマッチング成功（本番はサーバー照合）
  state.gameFlow.matched=true;
  state.gameFlow.matchKey=key;
  // gameInfoにも反映
  var org=ORGS.find(function(o){return o.id===gf.org;});
  var tour=(TOURNAMENTS[gf.org]||[]).find(function(t){return t.id===gf.tournament;});
  state.gameInfo.date=gf.date;
  state.gameInfo.title=(org?org.label:"")+" "+(tour?tour.label:"");
  renderNav();
  renderSection();
}
function gfStartInput(){
  renderNav();
  setSection("player");
}

// タップ選択方式（iOS/Android対応）
function gfSelPlayer(pid){
  state.playerDragSel=(state.playerDragSel===pid)?null:pid;
  renderSection();
}
function gfDropToSeat(w){
  var pid=state.playerDragSel;
  if(!pid)return;
  gfAssignSeat(w,pid);
  state.playerDragSel=null;
  renderSection();
}
// PC向けドラッグも残す
var _dragPid=null;
function dragPlayer(e,pid){
  _dragPid=pid||e.currentTarget.dataset.pid;
  if(e.dataTransfer)e.dataTransfer.effectAllowed="move";
}
function dropToSeat(e,w){
  if(e.preventDefault)e.preventDefault();
  var pid=_dragPid||(e.dataTransfer&&e.dataTransfer.getData("pid"));
  if(pid)gfAssignSeat(w,pid);
  _dragPid=null;
}

// 座席に選手を割り当て
function gfAssignSeat(w, pid){
  if(!state.seatMap)state.seatMap={east:null,south:null,west:null,north:null};
  if(pid===null){state.seatMap[w]=null;}
  else{
    // 他の座席に同じ選手が割り当て済みなら外す
    WE.forEach(function(ow){if(state.seatMap[ow]===pid&&ow!==w)state.seatMap[ow]=null;});
    state.seatMap[w]=pid;
  }
  renderSection();
}

// 自分が入力する座席を設定
function gfSetMyseat(w){
  state.seat=w;
  // リアルタイム小窓のタブも連動
  state.rtTab=["東家","南家","西家","北家"][WE.indexOf(w)];
  renderNav();
  renderSection();
}

// ══════════════════════════════════════════════
// 牌ボタントグル
// ══════════════════════════════════════════════
function toggleKbd(fn){
  if(!state.kbdOpen)state.kbdOpen={};
  state.kbdOpen[fn]=!state.kbdOpen[fn];
  renderSection();
}
function setKbdTab(tabId){
  state.kbdTab=tabId;
  renderSection();
}

// ══════════════════════════════════════════════
// リアルタイム小窓
// ══════════════════════════════════════════════
function rtPush(entry){
  entry.self=true;
  entry.ts=Date.now();
  state.rtLog.unshift(entry);
  if(state.rtLog.length>60)state.rtLog.pop();
  renderRtPanel();
}

// デモ用: 他ユーザーからの受信シミュレーション
function rtReceive(entry){
  entry.self=false;
  state.rtLog.unshift(entry);
  if(state.rtLog.length>60)state.rtLog.pop();
  renderRtPanel();
  // グリッドも再描画（審議チェックのため）
  if(state.section==="turns") renderSection();
}

// 牌譜完成度（%）計算
function calcCompletion(){
  var score=0,max=0;
  var tasks=[
    {done:!!state.seat,                                         w:1},
    {done:state.haipai.length>=13,                             w:1},
    {done:state.draws.filter(Boolean).length>0,                w:1},
    {done:state.discards.filter(Boolean).length>0,             w:1},
    {done:state.finalHand.length>0,                            w:1},
    {done:state.waitTiles.length>0,                            w:1},
    {done:!!state.agari.type,                                  w:1},
    {done:!!state.agari.score,                                 w:1},
  ];
  tasks.forEach(function(t){max+=t.w;if(t.done)score+=t.w;});
  return Math.round(score/max*100);
}

function renderRtPanel(){
  var tabsEl = document.getElementById("rt-tabs");
  var inner  = document.getElementById("rt-panel-inner");
  if(!inner) return;

  var RT_TABS = [
    {id:"haipai", label:"配牌"},
    {id:"turns",  label:"ツモ・捨て"},
    {id:"final",  label:"最終・待ち・副露"},
    {id:"agari",  label:"アガリ・点数"},
  ];
  if(!state.rtViewTab) state.rtViewTab = "haipai";
  var tab = state.rtViewTab;

  // タブボタン
  if(tabsEl){
    tabsEl.innerHTML = RT_TABS.map(function(t){
      var on = (t.id === tab);
      return '<button onclick="state.rtViewTab=\''+t.id+'\';renderRtPanel()" style="'
        +'flex:1;padding:7px 4px;font-size:11px;border:none;border-bottom:2px solid '
        +(on?'var(--b)':'transparent')+';background:transparent;'
        +'color:'+(on?'var(--b)':'var(--tx3)')+';cursor:pointer;font-weight:'+(on?'700':'400')+'">'
        +t.label+'</button>';
    }).join('');
  }

  var WJseats = ["東家","南家","西家","北家"];
  var sm = state.seatMap||{};
  var allP = Object.values(PLAYERS_MASTER).flat();

  // 他者確定データかどうかの判定（rtLogにselfフラグがある）
  function isSelfEntry(e){ return e.self === true; }

  // 座席ラベル+選手名
  function seatName(seatKey){
    var idx = WE.indexOf(seatKey);
    var label = WJseats[idx]||seatKey;
    var pid = sm[seatKey];
    var p = pid ? allP.find(function(x){return x.id===pid;}) : null;
    return label + (p?' '+p.name:'');
  }

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // 各タブのHTML生成
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  var html = '';

  if(tab === 'haipai'){
    // 配牌: 自分の入力 + 他者からのログ
    var seats = WE;
    html = seats.map(function(w){
      var isMe = (w === state.seat);
      var sn = seatName(w);
      // 自分の入力はstateから直接取得
      var tiles = isMe ? state.haipai : [];
      // 他者のログから配牌情報を収集
      if(!isMe){
        state.rtLog.forEach(function(e){
          if(e.seat===WJseats[WE.indexOf(w)]&&e.type==='haipai'&&e.tile){
            tiles = e.tiles||tiles;
          }
        });
      }
      var tileHtml = tiles.length
        ? '<div style="font-size:20px;letter-spacing:1px;line-height:1.3">'+tiles.map(teHtml).join('')+'</div>'
        : '<span style="font-size:11px;color:var(--tx3)">未入力</span>';
      var borderStyle = isMe ? 'border:.5px solid var(--bd)' : 'border:2px solid var(--b)';
      var bgStyle = isMe ? 'background:var(--sf)' : 'background:var(--b-bg)';
      return '<div style="'+borderStyle+';'+bgStyle+';border-radius:var(--ra);padding:8px 10px;margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:'+(isMe?'400':'700')+';color:'+(isMe?'var(--tx3)':'var(--b)')+';margin-bottom:4px">'
        +sn+(isMe?' (自分)':'')+'</div>'
        +tileHtml
        +'</div>';
    }).join('');
    if(!html) html = '<p style="font-size:12px;color:var(--tx3)">データなし</p>';
  }

  else if(tab === 'turns'){
    // ツモ・捨て: 全座席のミニグリッド
    var maxShow = Math.max(
      state.draws.filter(Boolean).length,
      state.discards.filter(Boolean).length,
      1
    );
    html = WE.map(function(w){
      var isMe = (w === state.seat);
      var sn = seatName(w);
      // 自分: stateから / 他者: rtLogから
      var draws = isMe ? state.draws : [];
      var discs  = isMe ? state.discards : [];
      if(!isMe){
        state.rtLog.forEach(function(e){
          var seat = WJseats[WE.indexOf(w)];
          if(e.seat===seat){
            if(e.type==='draw')    draws[e.idx]=e.tile;
            if(e.type==='discard') discs[e.idx]=e.tile;
          }
        });
      }
      var anyData = draws.some(Boolean)||discs.some(Boolean);
      var borderStyle = isMe ? 'border:.5px solid var(--bd)' : 'border:2px solid var(--b)';
      var bgStyle = isMe ? 'background:var(--sf)' : 'background:var(--b-bg)';
      var gridHtml = '';
      if(anyData){
        var maxIdx = 0;
        for(var i=0;i<21;i++){if(draws[i]||discs[i])maxIdx=i;}
        var drawRow='', discRow='';
        for(var j=0;j<=maxIdx;j++){
          var dt=draws[j], di2=discs[j];
          drawRow += '<span style="display:inline-flex;align-items:center;justify-content:center;'
            +'width:24px;height:24px;font-size:16px;border-radius:3px;'
            +'background:'+(dt?'var(--sf)':'var(--sf2)')+';border:.5px solid var(--bd);margin:1px">'
            +(dt?teHtml(dt):'<span style="font-size:8px;color:var(--tx3)">'+(j+1)+'</span>')+'</span>';
          discRow += '<span style="display:inline-flex;align-items:center;justify-content:center;'
            +'width:24px;height:24px;font-size:16px;border-radius:3px;'
            +'background:'+(di2?'var(--sf)':'var(--sf2)')+';border:.5px solid var(--bd);margin:1px">'
            +(di2?teHtml(di2):'<span style="font-size:8px;color:var(--tx3)">'+(j+1)+'</span>')+'</span>';
        }
        gridHtml = '<div style="font-size:9px;color:var(--tx3);margin-bottom:2px">ツモ</div>'
          +'<div style="display:flex;flex-wrap:wrap;margin-bottom:4px">'+drawRow+'</div>'
          +'<div style="font-size:9px;color:var(--tx3);margin-bottom:2px">捨て</div>'
          +'<div style="display:flex;flex-wrap:wrap">'+discRow+'</div>';
      } else {
        gridHtml = '<span style="font-size:11px;color:var(--tx3)">未入力</span>';
      }
      return '<div style="'+borderStyle+';'+bgStyle+';border-radius:var(--ra);padding:8px 10px;margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:'+(isMe?'400':'700')+';color:'+(isMe?'var(--tx3)':'var(--b)')+';margin-bottom:6px">'
        +sn+(isMe?' (自分)':'')+'</div>'
        +gridHtml+'</div>';
    }).join('');
  }

  else if(tab === 'final'){
    // 最終手牌・待ち・副露
    html = WE.map(function(w){
      var isMe = (w === state.seat);
      var sn = seatName(w);
      var finalTiles = isMe ? state.finalHand : [];
      var waitTiles  = isMe ? state.waitTiles.filter(Boolean) : [];
      var melds      = isMe ? state.melds : [];
      var borderStyle = isMe ? 'border:.5px solid var(--bd)' : 'border:2px solid var(--b)';
      var bgStyle = isMe ? 'background:var(--sf)' : 'background:var(--b-bg)';
      var finalHtml = finalTiles.length
        ? finalTiles.map(teHtml).join('')
        : '<span style="font-size:11px;color:var(--tx3)">未入力</span>';
      var waitHtml = waitTiles.length
        ? waitTiles.map(teHtml).join('')
        : '<span style="font-size:11px;color:var(--tx3)">なし</span>';
      var meldHtml = melds&&melds.length
        ? melds.map(function(m){return m.label||JSON.stringify(m);}).join(' / ')
        : '<span style="font-size:11px;color:var(--tx3)">なし</span>';
      return '<div style="'+borderStyle+';'+bgStyle+';border-radius:var(--ra);padding:8px 10px;margin-bottom:8px">'
        +'<div style="font-size:11px;font-weight:'+(isMe?'400':'700')+';color:'+(isMe?'var(--tx3)':'var(--b)')+';margin-bottom:4px">'+sn+(isMe?' (自分)':'')+'</div>'
        +'<div style="font-size:10px;color:var(--tx3)">最終手牌</div>'
        +'<div style="font-size:20px;letter-spacing:1px;line-height:1.4;margin-bottom:4px">'+finalHtml+'</div>'
        +'<div style="font-size:10px;color:var(--tx3)">待ち</div>'
        +'<div style="font-size:20px;letter-spacing:1px;line-height:1.4;margin-bottom:4px">'+waitHtml+'</div>'
        +'<div style="font-size:10px;color:var(--tx3)">副露</div>'
        +'<div style="font-size:12px;margin-top:2px">'+meldHtml+'</div>'
        +'</div>';
    }).join('');
  }

  else if(tab === 'agari'){
    // アガリ・点数
    var ag = state.agari;
    var mySummary = (ag.who||ag.type||ag.score)
      ? '<div style="background:var(--g-bg);border:.5px solid var(--g);border-radius:var(--ra);padding:8px 12px;margin-bottom:8px">'
        +'<div style="font-size:11px;color:var(--g);font-weight:600;margin-bottom:4px">自分の入力</div>'
        +'<div style="font-size:14px;font-weight:600">'
        +(ag.who?ag.who+' ':'' )+(ag.type?ag.type+' ':'')+(ag.from?ag.from+'から ':'' )
        +(ag.score?'<span style="color:var(--g);font-size:18px">'+ag.score+'</span>':'')
        +'</div>'
        +(ag.yaku?'<div style="font-size:12px;color:var(--tx2);margin-top:2px">'+ag.yaku+'</div>':'')
        +'</div>'
      : '<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">未入力</div>';

    // 他者のアガリログ
    var otherAgari = '';
    state.rtLog.forEach(function(e){
      if(e.type==='agari'&&!e.self){
        otherAgari += '<div style="border:2px solid var(--b);background:var(--b-bg);border-radius:var(--ra);padding:8px 10px;margin-bottom:8px">'
          +'<div style="font-size:11px;font-weight:700;color:var(--b);margin-bottom:4px">'+e.seat+'（確定済み）</div>'
          +'<div style="font-size:14px">'+( e.data?JSON.stringify(e.data):'(データ)')+'</div>'
          +'</div>';
      }
    });

    html = mySummary + (otherAgari||'<div style="font-size:11px;color:var(--tx3)">他者のデータ待ち</div>');
  }

  inner.innerHTML = html || '<p style="font-size:12px;color:var(--tx3)">データなし</p>';
}


function correctDispute(type,idx,tile){
  if(type==="draw")state.draws[idx]=tile;
  else if(type==="discard")state.discards[idx]=tile;
  state.rtLog=state.rtLog.filter(function(e){
    return!(e.type===type&&e.idx===idx&&e.tile!==tile);
  });
  renderRtPanel();
  if(state.section==="turns")renderSection();
}
