// チーの形候補
function chiOptions(nakiTile){
  var mc=nakiTile.match(/^(\d)([mps])$/i);
  if(!mc)return[];
  var n=parseInt(mc[1]),s=mc[2].toLowerCase();
  var opts=[];
  if(n<=7)opts.push({tiles:[n+s,(n+1)+s,(n+2)+s],nakiIdx:0,label:te(n+s)+"を先頭に"});
  if(n>=2&&n<=8)opts.push({tiles:[(n-1)+s,n+s,(n+1)+s],nakiIdx:1,label:te(n+s)+"を中間に"});
  if(n>=3)opts.push({tiles:[(n-2)+s,(n-1)+s,n+s],nakiIdx:2,label:te(n+s)+"を末尾に"});
  return opts;
}
// ポンの方向候補
function ponOptions(tile){
  return[
    {tiles:[tile,tile,tile],nakiIdx:0,from:"上家から"},
    {tiles:[tile,tile,tile],nakiIdx:1,from:"対面から"},
    {tiles:[tile,tile,tile],nakiIdx:2,from:"下家から"},
  ];
}
// カン候補（大明槓+暗カン）
function kanOptions(tile){
  return[
    {tiles:[tile,tile,tile,tile],nakiIdx:0,from:"上家から（大明槓）",attr:"0"},
    {tiles:[tile,tile,tile,tile],nakiIdx:1,from:"対面から（大明槓）",attr:"1"},
    {tiles:[tile,tile,tile,tile],nakiIdx:2,from:"下家から（大明槓）",attr:"2"},
    {tiles:[tile,tile,tile,tile],nakiIdx:-1,from:"暗カン（自分のツモ）",attr:"ankan"},
  ];
}

// 鳴いた牌にバッジをつけて表示
function tilesWithNakiHTML(tiles,nakiIdx){
  // 下家から(nakiIdx=2 かつ 4枚=カン) の場合、鳴バッジは最右端の牌につける
  var effectiveNakiIdx=nakiIdx;
  if(tiles.length===4&&nakiIdx===2){
    effectiveNakiIdx=3; // 一番右
  }
  return tiles.map(function(t,i){
    var e=te(t);
    if(i===effectiveNakiIdx){
      return'<span style="position:relative;display:inline-block">'
        +e
        +'<span style="position:absolute;top:-5px;right:-3px;font-size:8px;font-weight:700;'
        +'background:var(--a);color:#fff;border-radius:3px;padding:0 2px;line-height:1.4">鳴</span>'
        +'</span>';
    }
    return e;
  }).join("");
}

// 捨て牌のうち鳴かれた牌にバッジ
function discWithMeldBadge(discards,melds){
  return discards.map(function(tile,i){
    if(!tile)return'<span style="opacity:.2">·</span>';
    // この捨て牌インデックスがどの副露のdiscTileIndexと一致するか
    var meld=melds.find(function(m){return m.discTileIdx===i;});
    var nakiMeld=melds.find(function(m){
      // 鳴かれた牌 = discards[i]がnakiTileと一致
      return m.nakiTile===tile&&m.nakiFromDiscIdx===i;
    });
    var e=te(tile);
    if(nakiMeld){
      var bc=nakiMeld.type==="pon"?"#a32d2d":nakiMeld.type==="chi"?"#0f6e56":"#ba7517";
      var bl=nakiMeld.type==="pon"?"P↓":nakiMeld.type==="chi"?"C↓":"K↓";
      return'<span style="position:relative;display:inline-block">'
        +e
        +'<span style="position:absolute;top:-5px;right:-3px;font-size:8px;font-weight:700;'
        +'background:'+bc+';color:#fff;border-radius:3px;padding:0 2px;line-height:1.4">'+bl+'</span>'
        +'</span>';
    }
    return e;
  }).join("");
}

// 副露セクション描画
function renderMeldSection(){
  var d=state.meldDraft;
  var myDiscards=state.discards.filter(Boolean);
  var step=d?d.step:0; // 0=タイプ選択 1=牌選択 2=形/方向 3=嶺上牌 4=捨て牌 5=カンドラ 6=完了確認

  // 既存副露リスト
  var meldList=state.melds.length
    ?'<div style="margin-bottom:12px">'
      +'<div style="font-size:11px;color:var(--tx3);margin-bottom:6px">入力済み副露</div>'
      +state.melds.map(function(m,i){
        var lbl={pon:"ポン",chi:"チー",kan:"カン",ankan:"暗カン"}[m.isAnkan?"ankan":m.type]||m.type;
        var lc=m.type==="pon"?"background:#fbeaf0;border-color:#d4537e;color:#72243e"
                :m.type==="chi"?"background:var(--tl-bg);border-color:var(--tl);color:var(--tl)"
                :"background:var(--a-bg);border-color:var(--a);color:var(--a-t)";
        return'<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border:.5px solid var(--bd);border-radius:var(--ra);margin-bottom:4px;background:var(--sf)">'
          +'<span style="font-size:10px;padding:2px 7px;border-radius:20px;border:.5px solid;'+lc+'">'+lbl+'</span>'
          +'<span style="font-size:20px">'+tilesWithNakiHTML(m.tiles,m.nakiIdx)+'</span>'
          +(m.from?'<span style="font-size:11px;color:var(--tx3)">'+m.from+'</span>':"")
          +(m.rinshanTile?'<span style="font-size:11px;color:var(--a-t)">嶺上:'+te(m.rinshanTile)+'</span>':"")
          +(m.discTile?'<span style="font-size:11px;color:var(--tx3)">捨:'+te(m.discTile)+'</span>':"")
          +(m.kanDoraTile?'<span style="font-size:11px;color:var(--gold)">カンドラ:'+te(m.kanDoraTile)+'</span>':"")
          +'<button onclick="state.melds.splice('+i+',1);renderNav();renderSection()" style="margin-left:auto;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--r-bg);border:none;color:var(--r);cursor:pointer">削除</button>'
          +'</div>';
      }).join("")
      +'</div>'
    :"";

  // ─── ドラフト未作成: タイプ選択ボタン ───
  if(!d){
    var typeBtns=['pon','chi','kan'].map(function(type){
      var lbl={pon:"ポン",chi:"チー",kan:"カン"}[type];
      var lc=type==="pon"?"background:#fbeaf0;border-color:#d4537e;color:#72243e"
              :type==="chi"?"background:var(--tl-bg);border-color:var(--tl);color:var(--tl)"
              :"background:var(--a-bg);border-color:var(--a);color:var(--a-t)";
      return'<button onclick="meldStart(\''+type+'\')" style="flex:1;padding:14px 8px;border-radius:var(--ra);font-size:16px;font-family:inherit;border:.5px solid;cursor:pointer;font-weight:600;'+lc+'">'+lbl+'</button>';
    }).join("");
    return'<div class="card">'
      +'<div class="slabel">🔗 副露</div>'
      +meldList
      +'<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">副露の種類を選択</div>'
      +'<div style="display:flex;gap:8px">'+typeBtns+'</div>'
      +'</div>';
  }

  // ─── ドラフト進行中 ───
  var lbl={pon:"ポン",chi:"チー",kan:"カン"}[d.type];
  var lc=d.type==="pon"?"background:#fbeaf0;border-color:#d4537e;color:#72243e"
          :d.type==="chi"?"background:var(--tl-bg);border-color:var(--tl);color:var(--tl)"
          :"background:var(--a-bg);border-color:var(--a);color:var(--a-t)";
  var typeBadge='<span style="font-size:11px;padding:2px 8px;border-radius:20px;border:.5px solid;'+lc+'">'+lbl+'</span>';

  var body="";

  // STEP1: 鳴いた牌をスロット方式で入力
  if(d.step===1){
    body=nakiSlotRow(d.nakiTile);
  }


  // STEP2: 形・方向選択（optionsをグローバルに保存してインデックス参照）
  else if(d.step===2){
    var opts=[];
    var hint="";
    if(d.type==="chi"){
      opts=chiOptions(d.nakiTile);
      hint="チーの形を選んでください";
      if(!opts.length){
        body='<div style="color:var(--r);font-size:13px">⚠ '+te(d.nakiTile)+'はチーできません</div>';
      }
    } else if(d.type==="pon"){
      opts=ponOptions(d.nakiTile);
      hint="どこから鳴きましたか？";
    } else {
      opts=kanOptions(d.nakiTile);
      hint="カンの種類を選んでください";
    }
    // opts をグローバルに保存
    window._meldOpts=opts;
    if(opts.length){
      body='<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">'+hint+'</div>'
        +'<div style="display:flex;flex-direction:column;gap:6px">'
        +opts.map(function(opt,oi){
          return'<button onclick="meldPickShapeIdx('+oi+')"'
            +' style="display:flex;align-items:center;gap:10px;padding:9px 12px;'
            +'border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);'
            +'cursor:pointer;font-family:inherit;text-align:left;width:100%">'
            +(opt.from?'<span style="font-size:12px;color:var(--tx2);min-width:9em;flex-shrink:0">'+opt.from+'</span>':"")
            +'<span style="font-size:22px">'+tilesWithNakiHTML(opt.tiles,opt.nakiIdx)+'</span>'
            +(opt.label?'<span style="font-size:12px;color:var(--tx3)">'+opt.label+'</span>':"")
            +'</button>';
        }).join("")
        +'</div>';
    }
  }


  // STEP3: 嶺上牌（カンのみ）- スロット方式
  else if(d.step===3){
    body=kanSlotRow('rinshan','嶺上牌',d.rinshanTile,'meldPickRinshan');
  }

  // STEP4: 副露後の捨て牌
  else if(d.step===4){
    var discBtns2=myDiscards.length
      ? myDiscards.map(function(t,i){
          return'<div onclick="meldPickDisc(\''+t+'\','+i+')"'
            +' style="display:flex;flex-direction:column;align-items:center;gap:1px;'
            +'padding:4px 6px;border-radius:6px;border:.5px solid var(--bd2);'
            +'background:var(--sf);cursor:pointer;min-width:40px">'
            +'<span style="font-size:22px;line-height:1">'+te(t)+'</span>'
            +'<span style="font-size:9px;color:var(--tx3)">'+(i+1)+'巡目</span>'
            +'</div>';
        }).join("")
      :"";
    body='<div style="font-size:11px;color:var(--tx3);margin-bottom:8px">副露後の捨て牌</div>'
      +(d.rinshanTile?'<div style="font-size:11px;color:var(--a-t);margin-bottom:6px">嶺上: '+te(d.rinshanTile)+'</div>':"")
      +(myDiscards.length?'<div style="font-size:10px;color:var(--tx3);margin-bottom:4px">入力済みの捨て牌から:</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">'+discBtns2+'</div>':"")
      +kanSlotRow('disc','直接入力',d.discTile,'meldPickDiscDirect');
  }

  // STEP5: カンドラ（カンのみ）- スロット方式
  else if(d.step===5){
    body=kanSlotRow('kandora','カンドラ表示牌',d.kanDoraTile,'meldPickKandora')
      +'<button onclick="meldPickKandora(null)" style="margin-top:8px;padding:5px 14px;'
      +'border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;font-size:12px;color:var(--tx3)">スキップ（不明）</button>';
  }

  var backBtn=d.step>1?'<button onclick="state.meldDraft.step--;renderSection()" style="font-size:12px;padding:4px 10px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;margin-bottom:10px;color:var(--tx3)">← 戻る</button><br>':"";
  var cancelBtn='<button onclick="state.meldDraft=null;renderSection()" style="font-size:11px;padding:4px 10px;border-radius:var(--ra);border:.5px solid var(--bd2);background:var(--sf);cursor:pointer;margin-top:10px;color:var(--tx3)">キャンセル</button>';

  return'<div class="card">'
    +'<div class="slabel">🔗 副露</div>'
    +meldList
    +'<div style="border:.5px solid var(--a);border-radius:var(--ral);padding:14px;background:var(--a-bg)">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'+typeBadge
    +(d.nakiTile?'<span style="font-size:20px">'+te(d.nakiTile)+'</span>':"")
    +(d.tiles?'<span style="font-size:20px">'+tilesWithNakiHTML(d.tiles,d.nakiIdx)+'</span>':"")
    +(d.rinshanTile?'<span style="font-size:12px;color:var(--a-t)">嶺上:'+te(d.rinshanTile)+'</span>':"")
    +'</div>'
    +backBtn+body+cancelBtn
    +'</div></div>';
}

// 副露ドラフト操作
function meldStart(type){
  state.meldDraft={type:type,step:1,nakiTile:null,tiles:null,nakiIdx:0,from:"",isAnkan:false,rinshanTile:null,discTile:null,discTileIdx:null,kanDoraTile:null};
  renderSection();
}
function meldPickNakiTile(tile,discIdx){
  state.meldDraft.nakiTile=tile;
  state.meldDraft.nakiFromDiscIdx=discIdx!=null?discIdx:null;
  state.meldDraft.step=2;
  renderSection();
}
function meldPickNakiTileDirect(tile){
  meldPickNakiTile(tile,null);
}
function meldPickShapeIdx(oi){
  var opt=(window._meldOpts||[])[oi];
  if(!opt)return;
  state.meldDraft.tiles=opt.tiles;
  state.meldDraft.nakiIdx=opt.nakiIdx!=null?opt.nakiIdx:0;
  state.meldDraft.from=opt.from||"";
  state.meldDraft.isAnkan=(opt.attr==="ankan");
  state.meldDraft.step=(state.meldDraft.type==="kan")?3:4;
  renderSection();
}
function meldPickShape(opt){
  // 後方互換
  if(typeof opt==="number"){meldPickShapeIdx(opt);return;}
  state.meldDraft.tiles=opt.tiles;
  state.meldDraft.nakiIdx=opt.nakiIdx!=null?opt.nakiIdx:0;
  state.meldDraft.from=opt.from||"";
  state.meldDraft.isAnkan=(opt.attr==="ankan");
  state.meldDraft.step=(state.meldDraft.type==="kan")?3:4;
  renderSection();
}
// 鳴き牌1牌スロット（STEP1 ポン・チー・カン共通）
function nakiSlotRow(currentVal){
  var iid="kan-naki";
  var tile=currentVal||null;
  var previewHtml=tile?'<div style="font-size:42px;min-width:44px;line-height:1">'+teHtml(tile)+'</div>':"";
  return'<div style="margin-bottom:10px">'
    +'<div style="font-size:11px;color:var(--tx3);margin-bottom:4px">'
    +'他家から鳴いた牌を入力<span style="font-size:10px;opacity:.7">（直接入力可）</span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<input id="'+iid+'" type="text" inputmode="text"'
    +' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"'
    +' maxlength="3" placeholder="牌" value=""'
    +' style="width:56px;height:56px;font-size:16px;font-family:monospace;text-align:center;'
    +'border:2px solid var(--b);border-radius:10px;background:var(--b-bg);'

    +previewHtml
    +'</div></div>';
}

// カン関連1牌スロット
var kanActiveField=null;

function kanSlotRow(fieldName, label, currentVal, pickFn){
  var iid="kan-"+fieldName;
  var tile=currentVal||null;
  var previewHtml=tile?'<div style="font-size:42px;min-width:44px;line-height:1">'+teHtml(tile)+'</div>':"";
  return'<div style="margin-bottom:8px">'
    +'<div style="font-size:11px;color:var(--tx3);margin-bottom:4px">'+label+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<input id="'+iid+'" type="text" inputmode="text"'
    +' autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"'
    +' maxlength="3" placeholder="牌" value=""'
    +' style="width:56px;height:56px;font-size:16px;font-family:monospace;text-align:center;'
    +'border:2px solid var(--b);border-radius:10px;background:var(--b-bg);'
    +'color:var(--tx);padding:0;-webkit-appearance:none;box-sizing:border-box;outline:none;caret-color:var(--b)"'
    +' onfocus="kanSlotFocused(\''+fieldName+'\')"'
    +' oninput="kanSlotTextInput(this,\''+pickFn+'\')"'
    +' onkeydown="kanSlotKeydown(event,this,\''+fieldName+'\',\''+pickFn+'\')">'
    +previewHtml
    +'</div></div>';
}

function kanSlotFocused(f){
  kanActiveField=f;
  // renderSection不要・iOSキーボード維持
}

function kanSlotTextInput(input,pickFn){
  var v=input.value;
  if(!v)return;
  var tiles=parseTileText(v);
  if(tiles.length!==1)return;
  if(v.trim().length>=tileInputLen(tiles[0])){
    var fnMap={
      "meldPickRinshan":meldPickRinshan,
      "meldPickDiscDirect":meldPickDiscDirect,
      "meldPickKandora":meldPickKandora,
      "meldPickNakiTileDirect":meldPickNakiTileDirect,
    };
    if(fnMap[pickFn])fnMap[pickFn](tiles[0]);
  }
}

function kanSlotKeydown(e,input,fieldName,pickFn){
  if(e.key==="Enter"){
    e.preventDefault();
    var tiles=parseTileText(input.value);
    if(tiles.length){
      var fnMap={
        "meldPickRinshan":meldPickRinshan,
        "meldPickDiscDirect":meldPickDiscDirect,
        "meldPickKandora":meldPickKandora,
        "meldPickNakiTileDirect":meldPickNakiTileDirect,
      };
      if(fnMap[pickFn])fnMap[pickFn](tiles[0]);
    } else {
      // 空Enter → 次フィールドへ（カン系のみ）
      var order=["rinshan","disc","kandora"];
      var ni=order.indexOf(fieldName);
      if(ni>=0&&ni+1<order.length){
        var nextF=order[ni+1];
        var el=document.getElementById("kan-"+nextF);
        if(el){el.focus();}
      }
    }
  } else if(e.key==="Escape"){
    kanActiveField=null;
  }
}



function meldPickRinshan(tile){
  if(!tile){state.meldDraft.step=4;renderSection();return;}
  state.meldDraft.rinshanTile=tile;
  state.meldDraft.step=4;
  renderSection();
}
function meldPickDisc(tile,idx){
  state.meldDraft.discTile=tile;
  state.meldDraft.discTileIdx=idx!=null?idx:null;
  if(state.meldDraft.type==="kan"){
    state.meldDraft.step=5; // カンドラへ
  } else {
    meldFinish();
  }
  renderSection();
}
function meldPickDiscDirect(tile){meldPickDisc(tile,null);}
function meldPickKandora(tile){
  state.meldDraft.kanDoraTile=tile;
  meldFinish();
}
function meldFinish(){
  var d=state.meldDraft;
  state.melds.push({
    type:d.type,
    tiles:d.tiles||[d.nakiTile],
    nakiIdx:d.nakiIdx,
    nakiTile:d.nakiTile,
    nakiFromDiscIdx:d.nakiFromDiscIdx,
    from:d.from,
    isAnkan:d.isAnkan,
    rinshanTile:d.rinshanTile,
    discTile:d.discTile,
    discTileIdx:d.discTileIdx,
    kanDoraTile:d.kanDoraTile,
  });
  state.meldDraft=null;
  renderNav();
  renderSection();
}

function applyTurnsText(){
  var drawInp=document.getElementById("turns-text-draw");
  var discInp=document.getElementById("turns-text-disc");
  if(drawInp&&drawInp.value.trim()){
    var dt=parseTileText(drawInp.value);
    dt.forEach(function(t,i){if(i<18)state.draws[i]=t;});
  }
  if(discInp&&discInp.value.trim()){
    var ds=parseTileText(discInp.value);
    ds.forEach(function(t,i){if(i<18)state.discards[i]=t;});
  }
  renderNav();
  renderSection();
}


// ── 再生アプリ互換JSON生成 ──
function buildKifuJSON(){
  var gf=state.gameFlow;
  var org=ORGS.find(function(o){return o.id===gf.org;})||{label:""};
  var tour=(TOURNAMENTS[gf.org]||[]).find(function(t){return t.id===gf.tournament;})||{label:""};
  var allP=Object.values(PLAYERS_MASTER).flat();
  var playersMap={}, initHands={}, discards={}, playerScores={};
  WE.forEach(function(w,wi){
    var isMy=(w===(state.seat||""));
    // seatMapから選手を取得（なければ旧来のgf.players[wi]で）
    var sm=state.seatMap||{};
    var pid=sm[w]||(gf.players[wi]);
    var pInfo=pid?allP.find(function(x){return x.id===pid;}):null;
    initHands[w] = isMy ? state.haipai.slice() : [];
    discards[w]  = isMy ? state.discards.filter(Boolean) : [];
    var fromMap={"上家から":0,"対面から":1,"下家から":2};
    var myMelds=isMy?state.melds.map(function(m){
      return{type:m.isAnkan?"ankan":m.type, tiles:m.tiles||[],
        nakiIdx:m.nakiIdx, nakiIdxFixed:fromMap[m.from]!=null?fromMap[m.from]:null,
        discTile:m.discTile||null, discTileIdx:m.discTileIdx!=null?m.discTileIdx:null,
        rinshanTile:m.rinshanTile||null, kanDoraTile:m.kanDoraTile||null,
        kanTriggerTile:m.nakiTile||null, isAnkan:m.isAnkan||false};
    }):[];
    playersMap[w]={
      hand:  isMy?state.finalHand.slice():[],
      melds: myMelds,
      tsumo: isMy?state.draws.filter(Boolean):[],
      riichiIdx:-1,
    };
    playerScores[w]={name:pInfo?pInfo.name:seat, start:null, end:null};
  });
  var winnerW=null,loserW=null;
  if(state.agari.who){var wi=["東家","南家","西家","北家"].indexOf(state.agari.who);if(wi>=0)winnerW=WE[wi];}
  if(state.agari.from){var fi=["東家","南家","西家","北家"].indexOf(state.agari.from);if(fi>=0)loserW=WE[fi];}
  var scoreNum=parseInt((state.agari.score||"").replace(/[^0-9]/g,""))||0;
  if(state.agari.score&&state.agari.score.startsWith("-"))scoreNum=-scoreNum;
  var gameData={
    meta:{
      title:(org.label?org.label+" ":"")+tour.label+(state.gameInfo.round?" "+state.gameInfo.round:""),
      date:gf.date||"", bakaze:"東", kyoku:1, honba:0,
      dora_indicators:null, dora_indicator:null, ura_dora_indicators:null,
      result_type:state.agari.type==="ツモ"?"tsumo":state.agari.type==="ロン"?"ron":"ryukyoku",
      winner:winnerW, loser:loserW,
      yaku:state.agari.yaku?state.agari.yaku.split(/[・,，、]/).map(function(s){return s.trim();}).filter(Boolean):[],
      han:0,fu:0, score:scoreNum||null,
      confidence:"crowd", ai_notes:"みんなの牌譜から生成", tenpai:{},
    },
    players:playersMap, discards:discards,
    initHands:initHands, playerScores:playerScores,
  };
  return{gameData:gameData,steps_meta:{count:0},savedAt:new Date().toISOString(),source:"minnano_paihu",version:"1.0"};
}

function downloadKifuJSON(){
  var obj=buildKifuJSON();
  var gf=state.gameFlow;
  var tour=(TOURNAMENTS[gf.org]||[]).find(function(t){return t.id===gf.tournament;})||{label:"kifu"};
  var fname="mahjong_"+(gf.date||"nodate")+"_"+(tour.label||"kifu")+".json";
  var blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download=fname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function meldHTML(melds){
  if(!melds||!melds.length)return"";
  return melds.map(function(m){
    var label={chi:"チー",pon:"ポン",kan_open:"明カン",ankan:"暗カン",kan_add:"加カン"}[m.type]||m.type;
    var tiles=(m.tiles||[]).map(function(t,i){
      var hidden=m.type==="ankan"&&(i===0||i===3);
      return hidden?`<span style="opacity:.25">${te(t)}</span>`:te(t);
    }).join("");
    return`<span style="display:inline-flex;align-items:center;gap:1px;margin-right:5px;border:.5px solid #ccc;border-radius:3px;padding:1px 4px;font-size:11px">`
      +`<span style="font-size:8px;color:#b08030;font-weight:700;margin-right:2px">${label}</span>`
      +tiles
      +(m.discard?`<span style="font-size:8px;color:#888;margin:0 1px">→</span>${te(m.discard)}`:"")
      +`</span>`;
  }).join("");
}

function toggleRtWindow(){
  var w=document.getElementById("rt-window");
  var isOpen=w.style.display==="flex";
  w.style.display=isOpen?"none":"flex";
  if(!isOpen){
    // 初回または自分の座席が変わったらタブをリセット
    if(!state.rtTab||(state.seat&&state.rtTab!==state.seat))
      state.rtTab=state.seat||"東家";
    renderRtPanel();
    var badge=document.getElementById("fab-rt-badge");
    if(badge){badge.style.display="none";}
  }
}
function updateRtCount(){
  var el=document.getElementById("rt-count");
  if(el){
    var others=[...new Set((state.rtLog||[]).filter(function(e){return!e.self;}).map(function(e){return e.seat;}))];
    el.textContent=others.length?others.length+"名が入力中":"待機中";
  }
  // 新着バッジ
  var w=document.getElementById("rt-window");
  var badge=document.getElementById("fab-rt-badge");
  if(badge&&w&&w.style.display!=="flex"){
    var newCount=(state.rtLog||[]).filter(function(e){return!e.self&&Date.now()-e.ts<5000;}).length;
    if(newCount>0){
      badge.textContent=newCount>9?"9+":newCount;
      badge.style.display="flex";
    }
  }
}

}
