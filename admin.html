<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理人ページ – 牌譜アーカイブ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ed;--sf:#fff;--sf2:#f0ede6;
  --bd:rgba(0,0,0,.12);--bd2:rgba(0,0,0,.22);
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;
  --b:#185fa5;--b-bg:#e6f1fb;--b-t:#0c447c;
  --g:#3b6d11;--g-bg:#eaf3de;
  --r:#a32d2d;--r-bg:#fcebeb;
  --gold:#c8920a;--gold-bg:#fdf3dc;
  --ra:8px
}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;font-size:14px;line-height:1.6}
.wrap{max-width:1000px;margin:0 auto;padding:20px 16px}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:12px;color:var(--tx3);margin-bottom:20px}

/* ── ログイン画面 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--sf);border:.5px solid var(--bd);border-radius:12px;padding:32px;width:100%;max-width:340px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login-title{font-size:18px;font-weight:600;margin-bottom:20px;text-align:center}
label{font-size:12px;color:var(--tx3);display:block;margin-bottom:4px}
input[type=text],input[type=password]{width:100%;background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:9px 12px;font-size:14px;color:var(--tx);outline:none;font-family:inherit;margin-bottom:14px}
input:focus{box-shadow:0 0 0 2px var(--b)}
button{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:8px 16px;font-size:14px;color:var(--tx);cursor:pointer;font-family:inherit;transition:background .1s}
button:hover{background:var(--sf2)}
button.pri{background:var(--b);border-color:var(--b);color:#e6f1fb}
button.pri:hover{opacity:.88}
button.grn{background:var(--g);border-color:var(--g);color:var(--g-bg)}
button.sml{font-size:12px;padding:4px 10px}
button.ghost{background:transparent;border-color:var(--bd);color:var(--tx3)}
.err{color:var(--r);font-size:12px;margin-top:-10px;margin-bottom:12px;display:none}

/* ── 管理画面 ── */
#admin-screen{display:none}
.topbar{background:var(--sf);border-bottom:.5px solid var(--bd);padding:0 16px;position:sticky;top:0;z-index:100}
.topbar-inner{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:48px}
.topbar-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.admin-badge{font-size:10px;background:var(--r-bg);color:var(--r);border:.5px solid var(--r);border-radius:4px;padding:1px 6px;font-weight:700}

/* ── カード ── */
.card{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--ra);padding:16px;margin-bottom:12px}
.slabel{font-size:11px;color:var(--tx3);letter-spacing:.06em;font-weight:600;margin-bottom:10px;text-transform:uppercase}

/* ── 統計グリッド ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.stat-card{background:var(--sf2);border:.5px solid var(--bd);border-radius:var(--ra);padding:12px;text-align:center}
.stat-val{font-size:24px;font-weight:700;color:var(--b)}
.stat-lbl{font-size:11px;color:var(--tx3)}

/* ── テーブル ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--sf2);padding:8px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--tx3);border-bottom:.5px solid var(--bd2);white-space:nowrap}
td{padding:8px 10px;border-bottom:.5px solid var(--bd);vertical-align:middle}
tr:hover td{background:var(--sf2)}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.badge.pro{background:var(--gold-bg);color:var(--gold)}
.badge.player{background:var(--g-bg);color:var(--g)}
.badge.admin{background:var(--r-bg);color:var(--r)}
.pts-cell{font-weight:700;color:var(--gold)}
.rank-cell{font-weight:700;color:var(--b)}

/* ── フィルター・検索 ── */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.filter-row input[type=text]{width:200px;margin-bottom:0;font-size:13px;padding:6px 10px}
.filter-row select{background:var(--sf);border:.5px solid var(--bd2);border-radius:var(--ra);padding:6px 10px;font-size:13px;color:var(--tx);outline:none;font-family:inherit}
.row-count{font-size:12px;color:var(--tx3)}

/* ── ポイント編集 ── */
.pts-input{width:60px;text-align:right;font-size:13px;padding:4px 6px;border:.5px solid var(--bd2);border-radius:4px;background:var(--sf);color:var(--tx);font-family:inherit}
.pts-input:focus{outline:none;box-shadow:0 0 0 2px var(--b)}

/* ── 更新ログ ── */
.log-list{font-size:12px;color:var(--tx3);max-height:120px;overflow-y:auto}
.log-item{padding:3px 0;border-bottom:.5px solid var(--bd)}
</style>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">🀄 管理人ログイン</div>
    <label>ユーザーID</label>
    <input type="text" id="login-id" placeholder="admin">
    <label>パスワード</label>
    <input type="password" id="login-pw" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="err" id="login-err">IDまたはパスワードが違います</div>
    <button class="pri" style="width:100%;padding:10px" onclick="doLogin()">ログイン</button>
    <div style="font-size:11px;color:var(--tx3);margin-top:12px;text-align:center">
      ※このページは管理人専用です
    </div>
  </div>
</div>

<!-- ── 管理画面 ── -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-title">
        🀄 牌譜アーカイブ 管理画面
        <span class="admin-badge">ADMIN</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:12px;color:var(--tx3)" id="last-updated"></span>
        <button class="sml" onclick="doLogout()">ログアウト</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- タブ -->
    <div style="display:flex;gap:0;margin-bottom:20px;border-bottom:.5px solid var(--bd)">
      <button class="ghost" id="tab-accounts" onclick="setTab('accounts')"
        style="padding:8px 18px;border:none;border-bottom:2px solid var(--b);color:var(--b);font-weight:600">
        👤 アカウント一覧
      </button>
      <button class="ghost" id="tab-points" onclick="setTab('points')"
        style="padding:8px 18px;border:none;border-bottom:2px solid transparent;color:var(--tx3)">
        ⭐ ポイント設定
      </button>
      <button class="ghost" id="tab-log" onclick="setTab('log')"
        style="padding:8px 18px;border:none;border-bottom:2px solid transparent;color:var(--tx3)">
        📋 更新ログ
      </button>
    </div>

    <!-- ═══ アカウント一覧 ═══ -->
    <div id="pane-accounts">
      <!-- 統計 -->
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">総ユーザー数</div></div>
        <div class="stat-card"><div class="stat-val" id="st-active">—</div><div class="stat-lbl">今月アクティブ</div></div>
        <div class="stat-card"><div class="stat-val" id="st-pts">—</div><div class="stat-lbl">総付与ポイント</div></div>
        <div class="stat-card"><div class="stat-val" id="st-inputs">—</div><div class="stat-lbl">総入力件数</div></div>
      </div>

      <div class="card">
        <!-- フィルター -->
        <div class="filter-row">
          <input type="text" id="search-input" placeholder="🔍 名前・IDで検索" oninput="filterAccounts()">
          <select id="sort-select" onchange="filterAccounts()">
            <option value="pts_desc">ポイント↓</option>
            <option value="pts_asc">ポイント↑</option>
            <option value="name_asc">名前順</option>
            <option value="joined_desc">登録日↓</option>
            <option value="inputs_desc">入力数↓</option>
          </select>
          <select id="filter-type" onchange="filterAccounts()">
            <option value="all">全て</option>
            <option value="pro">PROのみ</option>
            <option value="player">対局者本人</option>
          </select>
          <span class="row-count" id="row-count"></span>
          <div style="margin-left:auto;display:flex;gap:6px">
            <button class="grn sml" onclick="downloadCSV()">📥 CSVダウンロード</button>
            <button class="sml" onclick="loadAccounts()">🔄 更新</button>
          </div>
        </div>

        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>順位</th>
                <th>ユーザーID</th>
                <th>名前</th>
                <th>属性</th>
                <th>ポイント</th>
                <th>入力件数</th>
                <th>正解率</th>
                <th>登録日</th>
                <th>最終活動</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="accounts-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ═══ ポイント設定 ═══ -->
    <div id="pane-points" style="display:none">
      <div class="card">
        <div class="slabel">ポイント獲得設定（points.csv と連動）</div>
        <p style="font-size:12px;color:var(--tx3);margin-bottom:12px">
          変更後「保存してCSVに反映」を押すと points.csv が更新されます。
        </p>
        <table style="width:100%">
          <thead>
            <tr>
              <th>ID</th><th>タスク</th><th style="text-align:right">ポイント</th><th>メモ</th>
            </tr>
          </thead>
          <tbody id="points-tbody"></tbody>
        </table>
        <div style="margin-top:14px;display:flex;gap:8px">
          <button class="pri" onclick="savePointsCSV()">💾 保存してCSVに反映</button>
          <button class="ghost sml" onclick="loadPointsFromCSV()">↺ CSVから再読込</button>
        </div>
      </div>
    </div>

    <!-- ═══ 更新ログ ═══ -->
    <div id="pane-log" style="display:none">
      <div class="card">
        <div class="slabel">更新ログ（直近50件）</div>
        <div class="log-list" id="log-list"></div>
      </div>
    </div>

  </div><!-- /wrap -->
</div><!-- /admin-screen -->

<script>
// ══════════════════════════════════════════════
// 認証（デモ: 本番はサーバー認証に置き換え）
// ══════════════════════════════════════════════
var ADMIN_ID  = "admin";
var ADMIN_PW  = "kifu2025";   // ← 本番では変更してください
var loggedIn  = false;

function doLogin(){
  var id = document.getElementById("login-id").value.trim();
  var pw = document.getElementById("login-pw").value;
  if(id === ADMIN_ID && pw === ADMIN_PW){
    loggedIn = true;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-screen").style.display = "block";
    initAdmin();
  } else {
    document.getElementById("login-err").style.display = "block";
  }
}
function doLogout(){
  loggedIn = false;
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-id").value = "";
  document.getElementById("login-pw").value = "";
}

// ══════════════════════════════════════════════
// サンプルアカウントデータ
// 本番: LocalStorage / サーバーAPIから取得
// ══════════════════════════════════════════════
var ACCOUNTS = [
  {id:"u001",name:"雷神ケンイチ",  pts:8420,inputs:34,acc:97.2,joined:"2024-10-01",lastActive:"2025-04-28",isPro:false,isPlayer:false},
  {id:"u002",name:"桜花散る",      pts:7150,inputs:29,acc:95.8,joined:"2024-10-05",lastActive:"2025-04-27",isPro:true, isPlayer:false},
  {id:"u003",name:"東風荘の鬼",    pts:6830,inputs:31,acc:94.1,joined:"2024-10-10",lastActive:"2025-04-28",isPro:false,isPlayer:true},
  {id:"u004",name:"麻雀修行中",    pts:5240,inputs:22,acc:91.3,joined:"2024-11-01",lastActive:"2025-04-26",isPro:false,isPlayer:false},
  {id:"u005",name:"天和待ち",      pts:4980,inputs:19,acc:93.7,joined:"2024-11-15",lastActive:"2025-04-25",isPro:false,isPlayer:false},
  {id:"u006",name:"ドラ爆選手",    pts:3720,inputs:18,acc:88.9,joined:"2024-12-01",lastActive:"2025-04-24",isPro:false,isPlayer:false},
  {id:"u007",name:"リーチ一発",    pts:3100,inputs:15,acc:90.2,joined:"2024-12-10",lastActive:"2025-04-22",isPro:false,isPlayer:false},
  {id:"u008",name:"赤五筒使い",    pts:2800,inputs:13,acc:87.5,joined:"2025-01-05",lastActive:"2025-04-20",isPro:false,isPlayer:false},
  {id:"u009",name:"初心者A",       pts:1240,inputs:8, acc:89.5,joined:"2025-02-14",lastActive:"2025-04-28",isPro:false,isPlayer:false},
  {id:"u010",name:"見習いプロ",    pts:980, inputs:6, acc:83.3,joined:"2025-03-01",lastActive:"2025-04-15",isPro:true, isPlayer:false},
  {id:"u011",name:"配牌研究家",    pts:760, inputs:5, acc:80.0,joined:"2025-03-20",lastActive:"2025-04-10",isPro:false,isPlayer:false},
  {id:"u012",name:"新人入力者",    pts:240, inputs:2, acc:75.0,joined:"2025-04-01",lastActive:"2025-04-05",isPro:false,isPlayer:false},
];

var POINTS_DATA = [];
var UPDATE_LOG  = [];

// ══════════════════════════════════════════════
// 初期化
// ══════════════════════════════════════════════
function initAdmin(){
  updateTimestamp();
  loadAccounts();
  loadPointsFromCSV();
  renderLog();
}

function updateTimestamp(){
  document.getElementById("last-updated").textContent =
    "最終更新: " + new Date().toLocaleString("ja-JP");
}

// ══════════════════════════════════════════════
// タブ切替
// ══════════════════════════════════════════════
function setTab(t){
  ["accounts","points","log"].forEach(function(id){
    document.getElementById("pane-"+id).style.display = id===t ? "block" : "none";
    var btn = document.getElementById("tab-"+id);
    btn.style.borderBottomColor = id===t ? "var(--b)" : "transparent";
    btn.style.color = id===t ? "var(--b)" : "var(--tx3)";
    btn.style.fontWeight = id===t ? "600" : "400";
  });
}

// ══════════════════════════════════════════════
// アカウント一覧
// ══════════════════════════════════════════════
function loadAccounts(){
  // 統計更新
  var totalPts = ACCOUNTS.reduce(function(s,a){return s+a.pts;},0);
  var totalInputs = ACCOUNTS.reduce(function(s,a){return s+a.inputs;},0);
  var now = new Date();
  var activeMonth = ACCOUNTS.filter(function(a){
    var d = new Date(a.lastActive);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }).length;
  document.getElementById("st-total").textContent   = ACCOUNTS.length;
  document.getElementById("st-active").textContent  = activeMonth;
  document.getElementById("st-pts").textContent     = totalPts.toLocaleString();
  document.getElementById("st-inputs").textContent  = totalInputs.toLocaleString();
  filterAccounts();
  addLog("アカウント一覧を更新しました");
}

function filterAccounts(){
  var q    = document.getElementById("search-input").value.toLowerCase();
  var sort = document.getElementById("sort-select").value;
  var type = document.getElementById("filter-type").value;

  var list = ACCOUNTS.filter(function(a){
    var matchQ = !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q);
    var matchT = type==="all" || (type==="pro"&&a.isPro) || (type==="player"&&a.isPlayer);
    return matchQ && matchT;
  });

  list.sort(function(a,b){
    if(sort==="pts_desc")  return b.pts-a.pts;
    if(sort==="pts_asc")   return a.pts-b.pts;
    if(sort==="name_asc")  return a.name.localeCompare(b.name,"ja");
    if(sort==="joined_desc")return b.joined.localeCompare(a.joined);
    if(sort==="inputs_desc")return b.inputs-a.inputs;
    return 0;
  });

  document.getElementById("row-count").textContent = list.length+"件";
  var tbody = document.getElementById("accounts-tbody");
  tbody.innerHTML = list.map(function(a,i){
    var badges = "";
    if(a.isPro)    badges += `<span class="badge pro">PRO</span> `;
    if(a.isPlayer) badges += `<span class="badge player">本人</span>`;
    var accColor = a.acc>=95?"var(--g)":a.acc>=85?"var(--b)":"var(--r)";
    return `<tr>
      <td class="rank-cell">${i+1}</td>
      <td><code style="font-size:11px;background:var(--sf2);padding:1px 5px;border-radius:3px">${a.id}</code></td>
      <td style="font-weight:${a.isPlayer||a.isPro?'600':'400'}">${a.name}</td>
      <td>${badges||'<span style="color:var(--tx3);font-size:11px">—</span>'}</td>
      <td class="pts-cell">${a.pts.toLocaleString()}</td>
      <td>${a.inputs}</td>
      <td style="color:${accColor}">${a.acc}%</td>
      <td style="font-size:11px;color:var(--tx3)">${a.joined}</td>
      <td style="font-size:11px;color:var(--tx3)">${a.lastActive}</td>
      <td>
        <button class="sml ghost" onclick="editPts('${a.id}')">pt編集</button>
      </td>
    </tr>`;
  }).join("");
}

function editPts(uid){
  var a = ACCOUNTS.find(function(x){return x.id===uid;});
  if(!a)return;
  var newPts = prompt(a.name+"の現在ポイント: "+a.pts+"\n新しいポイント数を入力:", a.pts);
  if(newPts===null)return;
  var n = parseInt(newPts);
  if(isNaN(n)||n<0){alert("正しい数値を入力してください");return;}
  var diff = n - a.pts;
  a.pts = n;
  addLog(a.name+"("+a.id+") のポイントを "+a.pts+" → "+n+"pt に変更（差分 "+(diff>=0?"+":"")+diff+"）");
  filterAccounts();
}

// ══════════════════════════════════════════════
// CSV ダウンロード
// ══════════════════════════════════════════════
function downloadCSV(){
  var sort = document.getElementById("sort-select").value;
  var q    = document.getElementById("search-input").value.toLowerCase();
  var type = document.getElementById("filter-type").value;
  var list = ACCOUNTS.filter(function(a){
    var matchQ = !q || a.name.toLowerCase().includes(q) || a.id.toLowerCase().includes(q);
    var matchT = type==="all"||(type==="pro"&&a.isPro)||(type==="player"&&a.isPlayer);
    return matchQ&&matchT;
  }).sort(function(a,b){
    if(sort==="pts_desc")return b.pts-a.pts;
    if(sort==="pts_asc") return a.pts-b.pts;
    if(sort==="name_asc")return a.name.localeCompare(b.name,"ja");
    return 0;
  });

  var header = "rank,id,name,pts,inputs,accuracy,is_pro,is_player,joined,last_active\n";
  var rows = list.map(function(a,i){
    return [
      i+1, a.id,
      '"'+a.name.replace(/"/g,'""')+'"',
      a.pts, a.inputs, a.acc,
      a.isPro?1:0, a.isPlayer?1:0,
      a.joined, a.lastActive
    ].join(",");
  }).join("\n");

  var blob = new Blob(["\uFEFF"+header+rows], {type:"text/csv;charset=utf-8"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href   = url;
  a.download = "accounts_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  addLog("アカウントCSVをダウンロードしました（"+list.length+"件）");
}

// ══════════════════════════════════════════════
// ポイント設定
// ══════════════════════════════════════════════
function parseCSV(text){
  var lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  var headers=lines[0].split(",").map(function(h){return h.trim();});
  return lines.slice(1).map(function(line){
    var cols=[],cur="",inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cols.push(cur.trim());
    var obj={};
    headers.forEach(function(h,i){obj[h]=cols[i]!==undefined?cols[i]:"";});
    return obj;
  });
}

function loadPointsFromCSV(){
  fetch("points.csv")
    .then(function(r){if(!r.ok)throw new Error();return r.text();})
    .then(function(txt){
      POINTS_DATA = parseCSV(txt);
      renderPointsTable();
    })
    .catch(function(){
      // フォールバック
      POINTS_DATA=[
        {id:"player_pos",task:"プレイヤー・位置情報",pts:"2",cls:"",note:""},
        {id:"haipai",task:"配牌入力",pts:"3",cls:"",note:""},
        {id:"turn",task:"ツモ・捨て牌入力（1巡につき）",pts:"1",cls:"",note:""},
        {id:"meld",task:"副露",pts:"3",cls:"",note:""},
        {id:"final_wait",task:"最終形＋待ち",pts:"3",cls:"",note:""},
        {id:"agari",task:"アガり方",pts:"3",cls:"",note:""},
        {id:"all_correct",task:"1局まるごと正解",pts:"20",cls:"hi",note:""},
        {id:"player_self",task:"対局者本人として入力",pts:"30",cls:"hi",note:""},
      ];
      renderPointsTable();
    });
}

function renderPointsTable(){
  var tbody = document.getElementById("points-tbody");
  tbody.innerHTML = POINTS_DATA.map(function(p,i){
    var clsColor = p.cls==="hi"?"var(--gold)":p.cls==="mid"?"var(--g)":"var(--tx)";
    return`<tr>
      <td style="font-size:11px;color:var(--tx3)"><code>${p.id}</code></td>
      <td>${p.task}</td>
      <td style="text-align:right">
        <input class="pts-input" type="number" min="0" value="${p.pts}"
          onchange="POINTS_DATA[${i}].pts=this.value"
          style="color:${clsColor}">
      </td>
      <td><input type="text" value="${p.note||''}" placeholder="メモ"
        style="font-size:12px;padding:3px 6px;width:120px;background:var(--sf);border:.5px solid var(--bd2);border-radius:4px;font-family:inherit;color:var(--tx)"
        onchange="POINTS_DATA[${i}].note=this.value"></td>
    </tr>`;
  }).join("");
}

function savePointsCSV(){
  var header = "id,task,pts,cls,note\n";
  var rows = POINTS_DATA.map(function(p){
    return [p.id,'"'+p.task.replace(/"/g,'""')+'"',p.pts,p.cls||"",'"'+(p.note||"").replace(/"/g,'""')+'"'].join(",");
  }).join("\n");

  var blob = new Blob([header+rows], {type:"text/csv;charset=utf-8"});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement("a");
  a.href   = url;
  a.download = "points.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  addLog("points.csv を保存・ダウンロードしました");
  alert("points.csv をダウンロードしました。\nサーバーの同じフォルダに上書きアップロードしてください。");
}

// ══════════════════════════════════════════════
// 更新ログ
// ══════════════════════════════════════════════
function addLog(msg){
  var now = new Date().toLocaleString("ja-JP");
  UPDATE_LOG.unshift("["+now+"] "+msg);
  if(UPDATE_LOG.length>50) UPDATE_LOG.pop();
  renderLog();
  updateTimestamp();
}
function renderLog(){
  var el = document.getElementById("log-list");
  if(!el)return;
  el.innerHTML = UPDATE_LOG.length
    ? UPDATE_LOG.map(function(l){return`<div class="log-item">${l}</div>`;}).join("")
    : `<div style="color:var(--tx3);font-size:12px;padding:6px 0">ログはまだありません</div>`;
}
</script>
</body>
</html>
