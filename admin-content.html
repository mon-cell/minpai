<style>

<script>
(function(){
// ══════════════════════════════════════════════
// データ（本番: REST APIまたはDBから取得）
// ══════════════════════════════════════════════
var ACCOUNTS=[
  {id:"u001",name:"雷神ケンイチ",  pts:8420,inputs:34,acc:97.2,joined:"2024-10-01",lastActive:"2025-04-28",isPro:false,isPlayer:false},
  {id:"u002",name:"桜花散る",      pts:7150,inputs:29,acc:95.8,joined:"2024-10-05",lastActive:"2025-04-27",isPro:true, isPlayer:false},
  {id:"u003",name:"東風荘の鬼",    pts:6830,inputs:31,acc:94.1,joined:"2024-10-10",lastActive:"2025-04-28",isPro:false,isPlayer:true},
  {id:"u004",name:"麻雀修行中",    pts:5240,inputs:22,acc:91.3,joined:"2024-11-01",lastActive:"2025-04-26",isPro:false,isPlayer:false},
  {id:"u005",name:"天和待ち",      pts:4980,inputs:19,acc:93.7,joined:"2024-11-15",lastActive:"2025-04-25",isPro:false,isPlayer:false},
  {id:"u006",name:"ドラ爆選手",    pts:3720,inputs:18,acc:88.9,joined:"2024-12-01",lastActive:"2025-04-24",isPro:false,isPlayer:false},
  {id:"u007",name:"リーチ一発",    pts:3100,inputs:15,acc:90.2,joined:"2024-12-10",lastActive:"2025-04-22",isPro:false,isPlayer:false},
  {id:"u008",name:"赤五筒使い",    pts:2800,inputs:13,acc:87.5,joined:"2025-01-05",lastActive:"2025-04-20",isPro:false,isPlayer:false},
  {id:"u009",name:"初心者A",       pts:1240,inputs:8, acc:89.5,joined:"2025-02-14",lastActive:"2025-04-28",isPro:false,isPlayer:false},
  {id:"u010",name:"見習いプロ",    pts:980, inputs:6, acc:83.3,joined:"2025-03-01",lastActive:"2025-04-15",isPro:true, isPlayer:false},
  {id:"u011",name:"配牌研究家",    pts:760, inputs:5, acc:80.0,joined:"2025-03-20",lastActive:"2025-04-10",isPro:false,isPlayer:false},
  {id:"u012",name:"新人入力者",    pts:240, inputs:2, acc:75.0,joined:"2025-04-01",lastActive:"2025-04-05",isPro:false,isPlayer:false},
];

var POINTS_DATA=[];
var UPDATE_LOG=[];

// ── CSVパーサー ──
function parseCSV(text){
  var lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  var headers=lines[0].split(",").map(function(h){return h.trim();});
  return lines.slice(1).map(function(line){
    var cols=[],cur="",inQ=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){inQ=!inQ;}
      else if(ch===","&&!inQ){cols.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cols.push(cur.trim());
    var obj={};
    headers.forEach(function(h,i){obj[h]=cols[i]!==undefined?cols[i]:"";});
    return obj;
  });
}

// ── 初期化 ──
function init(){
  kLoadAccounts();
  kLoadPointsCSV();
  kUpdateTimestamp();
}

function kUpdateTimestamp(){
  var el=document.getElementById("k-last-updated");
  if(el)el.textContent="更新: "+new Date().toLocaleString("ja-JP");
}

// ══════════════════════════════════════════════
// タブ
// ══════════════════════════════════════════════
window.kSetTab=function(t){
  ["accounts","points","log"].forEach(function(id){
    document.getElementById("k-pane-"+id).style.display=id===t?"block":"none";
    var btn=document.getElementById("k-tab-"+id);
    btn.classList.toggle("on",id===t);
  });
};

// ══════════════════════════════════════════════
// アカウント一覧
// ══════════════════════════════════════════════
window.kLoadAccounts=function(){
  var totalPts=ACCOUNTS.reduce(function(s,a){return s+a.pts;},0);
  var totalInputs=ACCOUNTS.reduce(function(s,a){return s+a.inputs;},0);
  var now=new Date();
  var active=ACCOUNTS.filter(function(a){
    var d=new Date(a.lastActive);
    return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  }).length;
  document.getElementById("k-st-total").textContent=ACCOUNTS.length;
  document.getElementById("k-st-active").textContent=active;
  document.getElementById("k-st-pts").textContent=totalPts.toLocaleString();
  document.getElementById("k-st-inputs").textContent=totalInputs.toLocaleString();
  kFilterAccounts();
  kAddLog("アカウント一覧を読み込みました");
  kUpdateTimestamp();
};

window.kFilterAccounts=function(){
  var q=document.getElementById("k-search").value.toLowerCase();
  var sort=document.getElementById("k-sort").value;
  var type=document.getElementById("k-type").value;
  var list=ACCOUNTS.filter(function(a){
    var mq=!q||a.name.toLowerCase().includes(q)||a.id.toLowerCase().includes(q);
    var mt=type==="all"||(type==="pro"&&a.isPro)||(type==="player"&&a.isPlayer);
    return mq&&mt;
  }).sort(function(a,b){
    if(sort==="pts_desc")return b.pts-a.pts;
    if(sort==="pts_asc") return a.pts-b.pts;
    if(sort==="name_asc")return a.name.localeCompare(b.name,"ja");
    if(sort==="joined_desc")return b.joined.localeCompare(a.joined);
    if(sort==="inputs_desc")return b.inputs-a.inputs;
    return 0;
  });
  document.getElementById("k-row-count").textContent=list.length+"件";
  document.getElementById("k-accounts-tbody").innerHTML=list.map(function(a,i){
    var badges="";
    if(a.isPro)    badges+='<span class="k-badge pro">PRO</span> ';
    if(a.isPlayer) badges+='<span class="k-badge player">本人</span>';
    var accColor=a.acc>=95?"var(--g)":a.acc>=85?"var(--b)":"var(--r)";
    return'<tr>'
      +'<td class="rank-cell">'+(i+1)+'</td>'
      +'<td><code style="font-size:10px;background:var(--sf2);padding:1px 4px;border-radius:3px">'+a.id+'</code></td>'
      +'<td style="font-weight:'+(a.isPlayer||a.isPro?'600':'400')+'">'+a.name+'</td>'
      +'<td>'+(badges||'<span style="color:var(--tx3);font-size:10px">—</span>')+'</td>'
      +'<td class="pts-cell">'+a.pts.toLocaleString()+'</td>'
      +'<td>'+a.inputs+'</td>'
      +'<td style="color:'+accColor+'">'+a.acc+'%</td>'
      +'<td style="font-size:10px;color:var(--tx3)">'+a.joined+'</td>'
      +'<td style="font-size:10px;color:var(--tx3)">'+a.lastActive+'</td>'
      +'<td><button class="k-btn sml ghost" onclick="kEditPts(\''+a.id+'\')">pt編集</button></td>'
      +'</tr>';
  }).join("");
};

window.kEditPts=function(uid){
  var a=ACCOUNTS.find(function(x){return x.id===uid;});
  if(!a)return;
  var v=prompt(a.name+"の現在ポイント: "+a.pts+"\n新しいポイント数:",a.pts);
  if(v===null)return;
  var n=parseInt(v);
  if(isNaN(n)||n<0){alert("正しい数値を入力してください");return;}
  var diff=n-a.pts; a.pts=n;
  kAddLog(a.name+"("+a.id+") ポイントを"+n+"ptに変更（差分 "+(diff>=0?"+":"")+diff+"）");
  kFilterAccounts();
};

// ══════════════════════════════════════════════
// CSV ダウンロード
// ══════════════════════════════════════════════
window.kDownloadCSV=function(){
  var sort=document.getElementById("k-sort").value;
  var q=document.getElementById("k-search").value.toLowerCase();
  var type=document.getElementById("k-type").value;
  var list=ACCOUNTS.filter(function(a){
    var mq=!q||a.name.toLowerCase().includes(q)||a.id.toLowerCase().includes(q);
    var mt=type==="all"||(type==="pro"&&a.isPro)||(type==="player"&&a.isPlayer);
    return mq&&mt;
  }).sort(function(a,b){
    if(sort==="pts_desc")return b.pts-a.pts;
    if(sort==="pts_asc") return a.pts-b.pts;
    return 0;
  });
  var hdr="rank,id,name,pts,inputs,accuracy,is_pro,is_player,joined,last_active\n";
  var rows=list.map(function(a,i){
    return[i+1,a.id,'"'+a.name.replace(/"/g,'""')+'"',
      a.pts,a.inputs,a.acc,a.isPro?1:0,a.isPlayer?1:0,a.joined,a.lastActive].join(",");
  }).join("\n");
  var blob=new Blob(["\uFEFF"+hdr+rows],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var el=document.createElement("a");
  el.href=url;
  el.download="accounts_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(el);el.click();
  document.body.removeChild(el);URL.revokeObjectURL(url);
  kAddLog("アカウントCSVをダウンロード（"+list.length+"件）");
};

// ══════════════════════════════════════════════
// ポイント設定
// ══════════════════════════════════════════════
window.kLoadPointsCSV=function(){
  fetch("points.csv")
    .then(function(r){if(!r.ok)throw new Error();return r.text();})
    .then(function(txt){
      POINTS_DATA=parseCSV(txt);
      kRenderPointsTable();
    })
    .catch(function(){
      POINTS_DATA=[
        {id:"player_pos",task:"プレイヤー・位置情報",pts:"2",cls:"",note:""},
        {id:"haipai",    task:"配牌入力",            pts:"3",cls:"",note:""},
        {id:"turn",      task:"ツモ・捨て牌（1巡）", pts:"1",cls:"",note:""},
        {id:"meld",      task:"副露",                pts:"3",cls:"",note:""},
        {id:"final_wait",task:"最終形＋待ち",        pts:"3",cls:"",note:""},
        {id:"agari",     task:"アガり方",            pts:"3",cls:"",note:""},
        {id:"all_correct",task:"1局まるごと正解",    pts:"20",cls:"hi",note:""},
        {id:"player_self",task:"対局者本人入力",     pts:"30",cls:"hi",note:""},
      ];
      kRenderPointsTable();
    });
};

function kRenderPointsTable(){
  document.getElementById("k-points-tbody").innerHTML=POINTS_DATA.map(function(p,i){
    var clr=p.cls==="hi"?"var(--gold)":p.cls==="mid"?"var(--g)":"var(--tx)";
    return'<tr>'
      +'<td style="font-size:10px;color:var(--tx3)"><code>'+p.id+'</code></td>'
      +'<td style="font-size:12px">'+p.task+'</td>'
      +'<td style="text-align:right">'
        +'<input class="k-pts-inp" type="number" min="0" value="'+p.pts+'" style="color:'+clr+'"'
        +' onchange="POINTS_DATA['+i+'].pts=this.value">'
      +'</td>'
      +'<td><input type="text" value="'+(p.note||'')+'" placeholder="メモ"'
        +' style="font-size:11px;padding:2px 5px;width:110px;background:var(--sf);border:1px solid var(--bd2);border-radius:3px;font-family:inherit;color:var(--tx)"'
        +' onchange="POINTS_DATA['+i+'].note=this.value"></td>'
      +'</tr>';
  }).join("");
}

window.kSavePointsCSV=function(){
  var hdr="id,task,pts,cls,note\n";
  var rows=POINTS_DATA.map(function(p){
    return[p.id,'"'+p.task.replace(/"/g,'""')+'"',p.pts,p.cls||"",'"'+(p.note||"").replace(/"/g,'""')+'"'].join(",");
  }).join("\n");
  var blob=new Blob([hdr+rows],{type:"text/csv;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var el=document.createElement("a");
  el.href=url; el.download="points.csv";
  document.body.appendChild(el); el.click();
  document.body.removeChild(el); URL.revokeObjectURL(url);
  kAddLog("points.csv を保存・ダウンロードしました");
  alert("points.csv をダウンロードしました。\nサーバーの同じフォルダに上書きアップロードしてください。");
};

// ══════════════════════════════════════════════
// 更新ログ
// ══════════════════════════════════════════════
function kAddLog(msg){
  UPDATE_LOG.unshift("["+new Date().toLocaleString("ja-JP")+"] "+msg);
  if(UPDATE_LOG.length>50)UPDATE_LOG.pop();
  var el=document.getElementById("k-log-list");
  if(el)el.innerHTML=UPDATE_LOG.map(function(l){
    return'<div class="k-log-item">'+l+'</div>';
  }).join("");
}
window.kAddLog=kAddLog;

// 起動
init();
})();
</script>
